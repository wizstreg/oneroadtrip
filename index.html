<!doctype html>
<html lang="fr" data-page="index">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>OneRoadTrip – Hundreds of free road trip itineraries with maps</title>
  <meta name="description" content="Browse hundreds of free itineraries with maps in dozens of countries. Customize them, add your bookings, and access them offline on your mobile."/>
  <meta property="og:title" content="OneRoadTrip – Hundreds of free road trip itineraries with maps"/>
  <meta property="og:description" content="Browse hundreds of free itineraries with maps in dozens of countries. Customize them, add your bookings, and access them offline on your mobile."/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://www.oneroadtrip.com/"/>
  <meta property="og:image" content="https://www.oneroadtrip.com/assets/image_index.webp"/>
  <meta property="og:site_name" content="OneRoadTrip"/>
  <link rel="canonical" href="https://www.oneroadtrip.com/"/>
  <meta name="color-scheme" content="light dark"/>
  <meta name="google-site-verification" content="9x0vlxR-FI8v0TreX1905W8nidw7h6uvzovMmwY2ihg" />
  <style>

    :root{
      --bg:#113f7a; --ink:#e7f6fb; --accent:#00b2ff; --heroBase:#0a2a57;
      --max:1100px;
    }
    *{ box-sizing:border-box; margin:0; padding:0 }
    html,body{ height:100% }
    body{ 
      background: linear-gradient(180deg, rgba(0,0,0,.5), rgba(0,0,0,.65)), url("assets/image_index.webp") center/cover no-repeat fixed;
      background-color: var(--heroBase);
      color:var(--ink); font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif 
    }

    /* HERO : image réelle + overlay sombre ; contenu légèrement remonté */
    .hero{
      position:relative; width:100%; min-height:calc(100vh - 50px);
      display:flex; align-items:flex-start; justify-content:center;
      text-align:left; color:#fff; background:var(--heroBase); overflow:hidden;
    }
    .hero::before{
      content:"";
      position:absolute; inset:0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.5), rgba(0,0,0,.65)),
        url("assets/image_index.webp") center/cover no-repeat;
      filter:saturate(1.05) contrast(1.05);
      animation:heroIn .9s ease-out both;
    }
    @keyframes heroIn{ from{ filter:saturate(1.05) contrast(1.05) brightness(.95) } to{ filter:saturate(1.05) contrast(1.05) brightness(1) } }

    .wrap{ max-width:var(--max); margin:0 auto; padding:16px }
    .hero > .content{ position:relative; z-index:1; padding:clamp(10px, 2.5vh, 35px) 24px 12px 16px; width:100%; max-width:1100px; margin:0 auto }

    /* Titres + métriques - tailles remontées ~120% */
    .headline{
      font-size:clamp(24px, 3.5vw, 42px);
      line-height:1.1; font-weight:800; letter-spacing:.2px; margin:0 0 6px 0;
      white-space:nowrap;
    }
    .metrics{ display:flex; gap:16px; align-items:baseline; flex-wrap:wrap; margin:4px 0 8px 0 }
    .metric{ display:flex; gap:8px; align-items:baseline }
    .metric .num{ font-weight:900; line-height:1; min-width:1ch }
    .metric.rt .num{ font-size:clamp(26px, 4.2vw, 38px) }
    .metric.cty .num,
    .metric.plc .num{ font-size:clamp(20px, 3.5vw, 32px) }
    .metric.vis .num,
    .metric.act .num{ font-size:clamp(18px, 3vw, 28px) }
    .metric.users .num{ font-size:clamp(18px, 3vw, 28px) }
    .metric .lbl{ font-size:clamp(13px, 2vw, 17px); opacity:.95 }

    /* Footer dans le hero */
    #footer-legal{ position:relative; z-index:1; color:#fff }
    #footer-legal a{ color:rgba(255,255,255,0.8) }
    #footer-legal a:hover{ color:#fff }
    /* Inputs dans le hero : texte sombre */
    .hero input[type="text"], .hero input[type="number"], .hero select{ color:#333 }

    /* Liste des features : puces natives (aucun "•" manuel) */
    .features{
      margin:18px 0 0 0; padding-left:22px; max-width:980px;
      font-size:clamp(15px, 2.05vw, 20px); line-height:1.6;
    }
    .features li{ margin:10px 0; }

    /* Note mobile - cachée sur desktop */
    .mobile-note{
      display:none;
      font-size:13px;
      opacity:0.9;
      font-style:italic;
      margin-top:16px;
      background:rgba(255,200,50,0.15);
      padding:10px 32px 10px 12px;
      border-radius:6px;
      border-left:3px solid #f0c030;
      position:relative;
    }
    .mobile-note .close-note{
      position:absolute;
      right:6px;
      top:50%;
      transform:translateY(-50%);
      background:none;
      border:none;
      font-size:18px;
      cursor:pointer;
      color:#fff;
      opacity:0.7;
      padding:4px 8px;
    }
    .mobile-note .close-note:hover{ opacity:1 }

    /* Wrapper des CTA avec bouton ? */
    .cta-wrapper{display:flex;gap:8px;align-items:center;position:relative}
    .cta-btn-info{background:none;border:none;color:inherit;font-size:24px;font-weight:700;cursor:pointer;padding:0;width:32px;height:32px;display:flex;align-items:center;justify-content:center;transition:all .2s ease;flex-shrink:0}
    .cta-btn-info:hover{transform:scale(1.15)}
    /* Caché en mobile */
    @media(max-width:640px){.cta-btn-info{display:none}}
    /* Responsive carrés et route builder dans le hero */
    @media(max-width:640px){
      .hero div[style*="repeat(4,1fr)"]{grid-template-columns:repeat(2,1fr) !important}
      .hero div[style*="1fr 1fr 1fr auto"]{grid-template-columns:1fr 1fr !important}
    }
    /* Modale explicative - une seule pour tous les modes */
    .mode-info-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9998;opacity:0;pointer-events:none;display:flex;align-items:center;justify-content:center;padding:20px;transition:opacity .3s ease}
    .mode-info-modal.active{opacity:1;pointer-events:auto}
    .mode-info-content{background:linear-gradient(135deg, #0a2a57 0%, #113f7a 100%);border-radius:16px;padding:0;max-width:700px;width:100%;max-height:85vh;overflow:hidden;color:#fff;box-shadow:0 25px 80px rgba(0,0,0,.5);display:flex;flex-direction:column;transform:scale(0.95);opacity:0;transition:all .3s ease}.mode-info-modal.active .mode-info-content{transform:scale(1);opacity:1}
    .mode-info-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.1);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s ease;z-index:10}
    .mode-info-close:hover{background:rgba(255,255,255,0.2);transform:scale(1.1)}
    /* Tabs */
    .mode-info-tabs{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,0.2);padding:0;background:rgba(0,0,0,0.2)}
    .mode-info-tab{padding:12px 16px;cursor:pointer;border:none;background:none;color:#fff;font-weight:600;font-size:clamp(0.85rem, 2.5vw, 1rem);transition:all .2s ease;border-bottom:3px solid transparent}
    .mode-info-tab:hover{background:rgba(255,255,255,0.05)}
    .mode-info-tab.active{border-bottom-color:#00b2ff;background:rgba(255,255,255,0.08)}
    /* Tab content */
    .mode-info-body{padding:24px;overflow-y:auto;flex:1}
    .mode-info-body h2{margin:0 0 16px 0;font-size:clamp(1.4rem, 5vw, 1.8rem);font-weight:800}
    .mode-info-body p{margin:12px 0;line-height:1.6;font-size:clamp(0.95rem, 2.5vw, 1.05rem)}
    .mode-info-body strong{font-weight:700;color:#00b2ff}
    .mode-info-list{margin:14px 0 14px 24px;padding-left:0}
    .mode-info-list li{margin:8px 0;line-height:1.5;font-size:clamp(0.9rem, 2.5vw, 1rem)}
    .mode-info-cta{margin-top:18px;padding-top:18px;border-top:1px solid rgba(255,255,255,0.2);font-style:italic;font-size:clamp(0.95rem, 2.5vw, 1.05rem);color:#c3d6b6}
    .how-modal-overlay{
      display:none;
      position:fixed;
      inset:0;
      z-index:1000;
      background:rgba(0,0,0,.8);
      align-items:center;
      justify-content:center;
      animation:fadeIn .2s ease;
    }
    .how-modal-overlay.show{ display:flex }
    .how-modal{
      background:linear-gradient(135deg, #0a2a57 0%, #113f7a 100%);
      border-radius:16px;
      padding:0;
      max-width:800px;
      width:94%;
      max-height:90vh;
      overflow:hidden;
      color:#fff;
      box-shadow:0 25px 80px rgba(0,0,0,.5);
      animation:slideUp .3s ease;
      display:flex;
      flex-direction:column;
    }
    .how-modal-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 24px;
      border-bottom:1px solid rgba(255,255,255,0.1);
      flex-shrink:0;
    }
    .how-modal-header h2{
      font-size:clamp(20px, 4vw, 26px);
      margin:0;
      font-weight:800;
    }
    .how-modal-close{
      background:rgba(255,255,255,0.1);
      border:none;
      color:#fff;
      font-size:24px;
      width:40px;
      height:40px;
      border-radius:50%;
      cursor:pointer;
      transition:all .2s ease;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .how-modal-close:hover{ background:rgba(255,255,255,0.2); transform:scale(1.1) }
    .how-modal-body{
      padding:24px;
      overflow-y:auto;
      flex:1;
    }
    .how-modal a{ color:var(--accent); }
    .how-alert{
      background:rgba(255,180,50,0.15);
      border-left:4px solid #f0a030;
      padding:14px 18px;
      border-radius:8px;
      margin-bottom:16px;
      font-size:15px;
      line-height:1.5;
    }
    .how-alert.info{
      background:rgba(100,180,255,0.12);
      border-left-color:var(--accent);
    }
    .how-intro-text{
      font-size:16px;
      margin:20px 0 16px 0;
      opacity:0.95;
    }
    .how-option{
      margin:18px 0;
      padding:16px 20px;
      background:rgba(255,255,255,0.05);
      border-radius:10px;
    }
    .how-option h3{
      font-size:18px;
      font-weight:700;
      margin:0 0 8px 0;
    }
    .how-option h3 span{
      font-weight:400;
      font-size:14px;
      opacity:0.7;
    }
    .how-option p, .how-option ul{
      font-size:15px;
      line-height:1.6;
      margin:0;
      opacity:0.92;
    }
    .how-option ul{
      margin:10px 0 0 0;
      padding-left:20px;
    }
    .how-option li{
      margin:8px 0;
    }
    .how-after{
      font-size:15px;
      line-height:1.6;
      margin:20px 0;
      opacity:0.92;
    }
    .how-dev{
      margin-top:24px;
      padding-top:20px;
      border-top:1px solid rgba(255,255,255,0.15);
    }
    .how-dev h3{
      font-size:17px;
      font-weight:700;
      margin:0 0 12px 0;
    }
    .how-dev ul{
      padding-left:20px;
      font-size:14px;
      line-height:1.6;
      opacity:0.88;
    }
    .how-dev li{ margin:6px 0; }
    /* Bouton Comment ça marche - VISIBLE SEULEMENT EN MOBILE */
    .cta-btn.how{
      display:none;
      background:linear-gradient(135deg, rgba(120,80,200,0.85) 0%, rgba(180,100,220,0.85) 100%);
    }
    .cta-btn.how:hover{
      background:linear-gradient(135deg, rgba(100,60,180,0.95) 0%, rgba(160,80,200,0.95) 100%);
      transform:translateY(-2px);
    }
    @media(max-width:640px){
      /* Cacher TOUS les boutons texte en mobile */
      .cta-btn{display:none}
      
      /* Afficher SEULEMENT le bouton "How" */
      .cta-btn.how{display:block !important}
      
      /* Cacher le conteneur CTA (buttons corner) */
      .cta-container{display:none !important}
      
      /* Afficher les icônes latérales */
      .icon-buttons{display:flex !important}
    }
    .cta-btn.trips{
      background:linear-gradient(135deg, rgba(255,170,50,0.85) 0%, rgba(255,200,100,0.85) 100%);
    }
    .cta-btn.trips:hover{
      background:linear-gradient(135deg, rgba(230,150,30,0.95) 0%, rgba(230,180,80,0.95) 100%);
      transform:translateY(-2px);
    }
    .cta-btn.contact{
      background:linear-gradient(135deg, rgba(107,114,128,0.85) 0%, rgba(156,163,175,0.85) 100%);
    }
    .cta-btn.contact:hover{
      background:linear-gradient(135deg, rgba(75,85,99,0.95) 0%, rgba(107,114,128,0.95) 100%);
      transform:translateY(-2px);
    }
    /* Icônes réseaux sociaux - compact en bas à droite */
    .social-links{
      display:flex;
      gap:6px;
      position:fixed;
      bottom:12px;
      right:12px;
      z-index:9;
      padding:6px 10px;
      background:rgba(17,63,122,0.85);
      border-radius:20px;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }
    .social-link{
      width:28px;
      height:28px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,0.15);
      color:#fff;
      text-decoration:none;
      transition:all .2s ease;
    }
    .social-link:hover{
      transform:scale(1.1);
      background:rgba(255,255,255,0.25);
    }
    .social-link svg{
      width:14px;
      height:14px;
      fill:currentColor;
    }
    .social-link.discord:hover{ background:#5865F2 }
    .social-link.instagram:hover{ background:linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888) }
    .social-link.facebook:hover{ background:#1877F2 }
    .social-link.x:hover{ background:#000 }
    /* Boutons icône ronds (mobile) */
    .icon-buttons{
      display:none;
      position:fixed;
      right:10px;
      top:50%;
      transform:translateY(-50%);
      flex-direction:column;
      gap:10px;
      z-index:10;
    }
    .icon-btn{
      width:44px;
      height:44px;
      border-radius:50%;
      border:none;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      color:#fff;
      box-shadow:0 4px 15px rgba(0,0,0,.3);
      transition:all .2s ease;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }
    .icon-btn:hover, .icon-btn:active{
      transform:scale(1.1);
    }
    .icon-btn.help{
      background:linear-gradient(135deg, rgba(120,80,200,0.9) 0%, rgba(180,100,220,0.9) 100%);
    }
    .icon-btn.mail{
      background:linear-gradient(135deg, rgba(107,114,128,0.9) 0%, rgba(156,163,175,0.9) 100%);
    }
    .icon-btn.camera{
      background:linear-gradient(135deg, rgba(255,100,150,0.9) 0%, rgba(255,150,200,0.9) 100%);
    }
    .icon-btn.list{
      background:linear-gradient(135deg, rgba(17,63,122,0.9) 0%, rgba(0,178,255,0.9) 100%);
    }
    .icon-btn.user{
      background:linear-gradient(135deg, rgba(255,170,50,0.9) 0%, rgba(255,200,100,0.9) 100%);
    }
    .icon-btn.plus{
      background:linear-gradient(135deg, rgba(33,71,107,0.9) 0%, rgba(16,185,129,0.9) 100%);
    }
    .icon-btn.home{
      background:linear-gradient(135deg, rgba(217,119,6,0.9) 0%, rgba(251,146,60,0.9) 100%);
    }
    .icon-btn svg{
      width:22px;
      height:22px;
      fill:currentColor;
    }
    @media (max-width: 480px) {
      .icon-buttons{
        right:6px;
        gap:8px;
      }
      .icon-btn{
        width:38px;
        height:38px;
      }
      .icon-btn svg{
        width:18px;
        height:18px;
      }
    }

    /* Boutons flottants - en haut sur desktop */
    .cta-container{
      position:fixed; right:16px; top:70px; z-index:60;
      display:flex; flex-direction:column; gap:10px; align-items:flex-end;
    }
    .cta-btn{
      background:linear-gradient(135deg, rgba(74,29,29,0.85) 0%, rgba(207,130,130,0.85) 100%); color:#fff; font-weight:700;
      padding:14px 24px; border-radius:999px; border:0; cursor:pointer;
      box-shadow:0 8px 20px rgba(0,0,0,.25);
      transition:all .2s ease;
      white-space:nowrap;
      text-decoration:none;
      display:inline-block;
      font-size:1rem;
      font-family:inherit;
      width:220px;
      text-align:center;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }
    .cta-btn:hover{ background:linear-gradient(135deg, rgba(58,21,21,0.95) 0%, rgba(184,110,110,0.95) 100%); transform:translateY(-2px) }
    .cta-btn.expert:hover{ background:linear-gradient(135deg, rgba(26,58,85,0.95) 0%, rgba(5,150,105,0.95) 100%); transform:translateY(-2px) }
    .cta-btn.expert{ background:linear-gradient(135deg, rgba(33,71,107,0.85) 0%, rgba(16,185,129,0.85) 100%); color:#fff }
    .cta-btn.itins{ background:linear-gradient(135deg, rgba(17,63,122,0.85) 0%, rgba(0,178,255,0.85) 100%); color:#fff }
    .cta-btn.itins:hover{ background:linear-gradient(135deg, rgba(10,42,87,0.95) 0%, rgba(0,144,204,0.95) 100%); transform:translateY(-2px) }
    /* Modal popup */
    .modal-overlay{
      display:none; position:fixed; inset:0; z-index:999;
      background:rgba(0,0,0,.75); align-items:center; justify-content:center;
      animation:fadeIn .2s ease;
    }
    .modal-overlay.show{ display:flex }
    .modal-content{
      background:#fff; color:#00243a; border-radius:12px;
      max-width:560px; width:90%; margin:16px; padding:28px;
      box-shadow:0 20px 60px rgba(0,0,0,.3);
      animation:slideUp .3s ease;
    }
    .modal-title{ font-size:24px; font-weight:800; margin:0 0 16px 0; color:#113f7a }
    .modal-text{ font-size:16px; line-height:1.6; margin:0 0 24px 0 }
    .modal-actions{ display:flex; gap:12px; justify-content:flex-end }
    .modal-btn{
      padding:10px 24px; border-radius:8px; border:0; cursor:pointer;
      font-weight:600; font-size:15px; transition:all .2s ease;
    }
    .modal-btn.primary{ background:var(--accent); color:#00243a }
    .modal-btn.primary:hover{ filter:brightness(1.1) }
    .modal-btn.secondary{ background:#e0e0e0; color:#333 }
    .modal-btn.secondary:hover{ background:#d0d0d0 }
    @keyframes fadeIn{ from{ opacity:0 } to{ opacity:1 } }
    @keyframes slideUp{ from{ transform:translateY(20px); opacity:0 } to{ transform:translateY(0); opacity:1 } }

    /* Animations “remontée” (stagger) */
    .anim-rise { --delay-step: 90ms; }
    .anim-rise .headline,
    .anim-rise .metrics,
    .anim-rise .features li {
      opacity:0;
      transform:translate3d(0, 12px, 0);
      will-change:transform, opacity;
      animation:fadeUp .66s ease-out forwards;
      animation-delay:var(--d, 0ms);
    }
    @keyframes fadeUp{ from{ opacity:0; transform:translate3d(0, 12px, 0) } to{ opacity:1; transform:translate3d(0, 0, 0) } }

    /* RTL */
    [dir="rtl"] .hero{ text-align:right }
    [dir="rtl"] .features{ padding-left:0; padding-right:22px }

    /* ===== RESPONSIVE MOBILE ===== */
    /* Tablettes et petits écrans */
    @media (max-width: 768px) {
      .hero{ min-height:auto }
      .hero > .content{ padding:12px 16px; max-width:100%; text-align:center }
      .headline{ font-size:clamp(18px, 5vw, 26px); margin-bottom:6px; white-space:normal }
      .metrics{ 
        justify-content:center;
        gap:6px 14px; 
        margin:4px 0 6px;
      }
      .metric{ gap:5px }
      .metric .num{ font-size:clamp(18px, 4.5vw, 26px) !important }
      .metric .lbl{ font-size:clamp(11px, 2.8vw, 14px) }
      .features{ display:none }
    }
      .features li{ margin:8px 0 }
      .features li:last-child{ margin-bottom:0 }
      /* Afficher la note mobile */
      .mobile-note{ display:block }
      /* Cacher tous les boutons texte sur mobile */
      .cta-btn{ display:none }
      /* Afficher les boutons icône sur mobile */
      .icon-buttons{ display:flex }
      /* Cacher le container CTA (les boutons texte) */
      .cta-container{
        display:none;
      }
      /* Icônes sociales sur mobile - compact en bas à droite */
      .social-links{
        bottom:8px;
        right:8px;
        padding:5px 8px;
      }
      .social-link{
        width:26px;
        height:26px;
      }
      .social-link svg{
        width:13px;
        height:13px;
      }
      /* Modal responsive */
      .modal-content{
        margin:12px;
        padding:20px;
        max-height:85vh;
        overflow-y:auto;
      }
      .modal-title{ font-size:20px }
      .modal-text{ font-size:15px }
      .modal-actions{ flex-direction:column; gap:10px }
      .modal-btn{ width:100%; text-align:center }
      /* Modale How responsive */
      .how-modal{
        width:100%;
        max-width:100%;
        height:100%;
        max-height:100%;
        border-radius:0;
      }
      .how-modal-header{ padding:16px }
      .how-modal-header h2{ font-size:18px }
      .how-modal-body{ padding:16px }
      .how-alert{ font-size:14px; padding:12px 14px }
      .how-intro-text{ font-size:15px }
      .how-option{ padding:14px 16px }
      .how-option h3{ font-size:16px }
      .how-option p, .how-option ul{ font-size:14px }
      .how-after{ font-size:14px }
      .how-dev h3{ font-size:15px }
      .how-dev ul{ font-size:13px }
    }
    /* Smartphones petits */
    @media (max-width: 480px) {
      .hero > .content{ padding:8px 10px }
      .headline{ font-size:clamp(16px, 4.5vw, 22px) }
      .metrics{
        display:grid;
        grid-template-columns: repeat(2, 1fr);
        gap:4px 10px;
      }
      .metric.rt{ grid-column: span 2; justify-self:center }
      .metric .num{ font-size:clamp(16px, 4vw, 22px) !important }
      .metric .lbl{ font-size:clamp(10px, 2.5vw, 12px) }
    }
    /* Mode paysage sur mobile */
    @media (max-width: 768px) and (orientation: landscape) {
      .hero{ min-height:100vh }
      .hero > .content{ padding-top:16px }
      .metrics{ flex-direction:row; flex-wrap:wrap; gap:12px 20px }
      .cta-container{ 
        flex-direction:row; 
        justify-content:center;
        padding:10px;
      }
      .cta-btn{ 
        border-radius:999px !important; 
        flex:0 1 auto;
        width:180px;
      }
    }
    /* Touch-friendly : pas d'effets hover sur mobile */
    @media (hover: none) {
      .cta-btn:hover{ transform:none }
    }
    /* Safe area pour iPhone avec encoche */
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .cta-container{
        padding-bottom:env(safe-area-inset-bottom);
      }
    }

    /* ============================================
       CARROUSEL DERNIERS ITINÉRAIRES (TOP BANNER)
       ============================================ */
    .latest-carousel-container {
      background: linear-gradient(135deg, #b45309 0%, #d97706 50%, #f59e0b 100%);
      padding: 14px 16px;
      margin: 0;
      position: relative;
      z-index: 50;
      box-shadow: 0 4px 12px rgba(180,83,9,0.4);
    }
    .latest-carousel {
      max-width: var(--max);
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .carousel-label {
      font-weight: 700;
      color: #fff;
      font-size: 15px;
      white-space: nowrap;
      background: rgba(0,0,0,0.2);
      padding: 6px 14px;
      border-radius: 20px;
      flex-shrink: 0;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }
    .carousel-arrow {
      background: rgba(0,0,0,0.2);
      border: none;
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    .carousel-arrow:hover {
      background: rgba(0,0,0,0.35);
      transform: scale(1.1);
    }
    .carousel-content {
      flex: 1;
      display: flex;
      align-items: center;
      overflow: hidden;
      min-width: 0;
    }
    .carousel-slides {
      flex: 1;
      position: relative;
      height: 36px;
      overflow: hidden;
    }
    .carousel-slide {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      transform: translateX(20px);
      transition: all 0.4s ease;
      pointer-events: none;
      color: #fff;
      cursor: pointer;
      padding: 0 8px;
      border-radius: 8px;
    }
    .carousel-slide.active {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }
    .carousel-slide.exit {
      opacity: 0;
      transform: translateX(-20px);
    }
    .carousel-slide:hover {
      background: rgba(255,255,255,0.1);
    }
    .carousel-slide:hover .carousel-title {
      text-decoration: underline;
    }
    .carousel-flag {
      font-size: 20px;
      flex-shrink: 0;
    }
    .carousel-title {
      flex: 1;
      font-weight: 600;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .carousel-days {
      font-size: 13px;
      opacity: 0.85;
      white-space: nowrap;
      flex-shrink: 0;
      background: rgba(0,0,0,0.2);
      padding: 2px 8px;
      border-radius: 10px;
    }
    .carousel-see-all {
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      transition: all 0.2s ease;
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 6px;
      background: rgba(0,0,0,0.2);
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }
    .carousel-see-all:hover {
      color: #fff;
      background: rgba(0,0,0,0.35);
    }
    /* Carrousel Tablette */
    @media (max-width: 900px) {
      .carousel-days { display: none; }
      .carousel-title { font-size: 14px; }
    }
    /* Carrousel Mobile */
    @media (max-width: 640px) {
      .latest-carousel-container { padding: 10px 12px; }
      .latest-carousel { gap: 6px; }
      .carousel-label { 
        font-size: 13px; 
        padding: 4px 10px;
      }
      .carousel-arrow { 
        width: 28px; 
        height: 28px; 
        font-size: 10px; 
      }
      .carousel-title { font-size: 13px; }
      .carousel-flag { font-size: 18px; }
      .carousel-see-all { 
        font-size: 12px; 
        padding: 4px 8px;
      }
    }
    /* Très petit mobile */
    @media (max-width: 480px) {
      .carousel-label { display: none; }
      .carousel-see-all span { display: none; }
    }
    /* RTL pour l'arabe */
    [dir="rtl"] .latest-carousel { flex-direction: row-reverse; }
    [dir="rtl"] .carousel-slide { flex-direction: row-reverse; }
  
</style>

window.ORT_I18N_MODES = {simpleTitle:{fr:'Mode Simple',en:'Simple Mode',es:'Modo Simple',it:'Modalità Semplice',pt:'Modo Simples',ar:'الوضع البسيط'},simpleDesc:{fr:'Le mode Simple vous donne accès à une sélection de plusieurs centaines d\'itinéraires préconçus couvrant plus de 90 pays. Ces roadtrips, disponibles en 6 langues, ont été créés et testés lors du développement de OneRoadTrip. Certains seront améliorés dans les semaines à venir, notamment concernant les visites et activités.',en:'Simple Mode gives you access to hundreds of pre-made itineraries covering over 90 countries. These roadtrips, available in 6 languages, were created and tested during OneRoadTrip\'s development. Some will be improved in the coming weeks, especially regarding visits and activities.',es:'El Modo Simple le da acceso a cientos de itinerarios premade que cubren más de 90 países. Estos roadtrips, disponibles en 6 idiomas, fueron creados y probados durante el desarrollo de OneRoadTrip. Algunos se mejorarán en las próximas semanas, especialmente respecto a visitas y actividades.',it:'La Modalità Semplice ti dà accesso a centinaia di itinerari preconfezionati che coprono più di 90 paesi. Questi roadtrips, disponibili in 6 lingue, sono stati creati e testati durante lo sviluppo di OneRoadTrip. Alcuni verranno migliorati nelle prossime settimane, specialmente per quanto riguarda visite e attività.',pt:'O Modo Simples oferece acesso a centenas de itinerários pré-feitos cobrindo mais de 90 países. Estas viagens, disponíveis em 6 idiomas, foram criadas e testadas durante o desenvolvimento do OneRoadTrip. Algumas serão melhoradas nas próximas semanas, especialmente quanto a visitas e atividades.',ar:'يوفر الوضع البسيط لك الوصول إلى مئات من المسارات المُعدة مسبقًا التي تغطي أكثر من 90 دولة. تم إنشاء هذه الرحلات، المتاحة بـ 6 لغات، واختبارها أثناء تطوير OneRoadTrip. سيتم تحسين البعض في الأسابيع القادمة، خاصة فيما يتعلق بالزيارات والأنشطة.'},simpleAccessTitle:{fr:'En sélectionnant un itinéraire :', om fotos livres de direitos e links de reserva)','Tempo e distância estimados até a próxima etapa','Número de noites (editável) e datas','Link para reservar acomodação','Opção para excluir uma etapa','Capacidade de reorganizar etapas por arrasto'],ar:['رقم ووصف المرحلة','الزيارات والأنشطة الموصى بها (مع صور خالية من الحقوق ورابط الحجوزات)','الوقت والمسافة المقدرة إلى المرحلة التالية','عدد الليالي (قابل للتعديل) والتواريخ','رابط لحجز الإقامة','خيار حذف المرحلة','القدرة على إعادة تنظيم المراحل بالسحب والإفلات']},simpleMapView:{fr:'<strong>Vue Carte</strong> (plein écran possible) : Visualisez votre trajet avec option d\'ajouter d\'autres lieux des autres itinéraires (ajout en dernière position ; réorganisation disponible sur la liste)',en:'<strong>Map View</strong> (fullscreen available): Visualize your route with the option to add places from other itineraries (added at the end; reorganization available on the list)',es:'<strong>Vista de Mapa</strong> (pantalla completa disponible): Visualice su ruta con la opción de agregar lugares de otros itinerarios (añadido al final; reorganización disponible en la lista)',it:'<strong>Vista Mappa</strong> (fullscreen disponibile): Visualizza il tuo percorso con l\'opzione di aggiungere luoghi da altri itinerari (aggiunto alla fine; reorganizzazione disponibile nell\'elenco)',pt:'<strong>Vista de Mapa</strong> (tela cheia disponível): Visualize sua rota com a opção de adicionar locais de outros itinerários (adicionado ao final; reorganização disponível na lista)',ar:'<strong>عرض الخريطة</strong> (ملء الشاشة متاح): تصور مسارك مع خيار إضافة أماكن من مسارات أخرى (مضاف في النهاية؛ إعادة التنظيم متاحة في القائمة)'},simpleTools:{fr:'<strong>En haut de page :</strong>',en:'<strong>At the top of the page:</strong>',es:'<strong>En la parte superior de la página:</strong>',it:'<strong>In cima alla pagina:</strong>',pt:'<strong>No topo da página:</strong>',ar:'<strong>في أعلى الصفحة:</strong>'},simpleToolsItems:{fr:['<strong>Services</strong> : Réservez vols, voitures, assurances','<strong>Outils</strong> : Fiche pays, signalement ou notation de l\'itinéraire','<strong>Dashboard</strong> : Accédez à vos voyages sauvegardés (connexion requise)','<strong>Carnet</strong> : Générez un carnet de voyage papier/numérique'],en:['<strong>Services</strong>: Book flights, cars, insurance','<strong>Tools</strong>: Country information, report or rate the itinerary','<strong>Dashboard</strong>: Access your saved trips (login required)','<strong>Notebook</strong>: Generate a paper/digital travel journal'],es:['<strong>Servicios</strong>: Reserve vuelos, autos, seguros','<strong>Herramientas</strong>: Información del país, informe o calificación del itinerario','<strong>Panel</strong>: Acceda a sus viajes guardados (se requiere inicio de sesión)','<strong>Cuaderno</strong>: Genere un diario de viaje en papel/digital'],it:['<strong>Servizi</strong>: Prenota voli, auto, assicurazioni','<strong>Strumenti</strong>: Informazioni sul paese, segnala o valuta l\'itinerario','<strong>Dashboard</strong>: Accedi ai tuoi viaggi salvati (accesso richiesto)','<strong>Quaderno</strong>: Genera un diario di viaggio cartaceo/digitale'],pt:['<strong>Serviços</strong>: Reserve voos, carros, seguros','<strong>Ferramentas</strong>: Informações do país, relatório ou classificação do itinerário','<strong>Painel</strong>: Acesse suas viagens salvas (login obrigatório)','<strong>Caderno</strong>: Gere um diário de viagem em papel/digital'],ar:['<strong>الخدمات</strong>: احجز رحلات وسيارات وتأمين','<strong>الأدوات</strong>: معلومات البلد والإبلاغ عن المسار أو تقييمه','<strong>لوحة التحكم</strong>: الوصول إلى رحلاتك المحفوظة (يلزم تسجيل الدخول)','<strong>الدفتر</strong>: إنشاء دفتر سفر ورقي/رقمي']},simpleExpertCTA:{fr:'→ Pour plus de fonctionnalités, passez au <strong>Mode Expert</strong>',en:'→ For more features, switch to <strong>Expert Mode</strong>',es:'→ Para más funciones, cambie al <strong>Modo Experto</strong>',it:'→ Per più funzioni, passa alla <strong>Modalità Esperto</strong>',pt:'→ Para mais recursos, mude para o <strong>Modo Expert</strong>',ar:'→ لمزيد من الميزات، انتقل إلى <strong>وضع الخبير</strong>'},itinsTitle:{fr:'Voir les itinéraires',en:'Browse itineraries',es:'Ver itinerarios',it:'Sfoglia gli itinerari',pt:'Ver itinerários',ar:'تصفح المسارات'},itinsDesc:{fr:'Le mode Itinéraires vous donne accès à une page avec les titres de tous les itinéraires créés. Vous pouvez les filtrer de diverses façons. Les itinéraires vous seront présentés sous forme de guide de voyages inspirant. Ils seront entièrement personnalisables dans la page Expert.',en:'The Itineraries mode gives you access to a page with the titles of all created itineraries. You can filter them in various ways. The itineraries are presented as inspiring travel guides. They are fully customizable on the Expert page.',es:'El modo Itinerarios le da acceso a una página con los títulos de todos los itinerarios creados. Puede filtrarlos de varias formas. Los itinerarios se presentan como guías de viaje inspiradoras. Son completamente personalizables en la página Expert.',it:'La modalità Itinerari ti dà accesso a una pagina con i titoli di tutti gli itinerari creati. Puoi filtrarli in vari modi. Gli itinerari sono presentati come guide di viaggio ispiratrici. Sono completamente personalizzabili nella pagina Expert.',pt:'O modo Itinerários oferece acesso a uma página com os títulos de todos os itinerários criados. Você pode filtrá-los de várias maneiras. Os itinerários são apresentados como guias de viagem inspiradores. Eles são totalmente personalizáveis na página Expert.',ar:'يوفر وضع المسارات لك الوصول إلى صفحة تحتوي على عناوين جميع المسارات التي تم إنشاؤها. يمكنك تصفيتها بطرق مختلفة. يتم عرض المسارات كأدلة سفر ملهمة. يمكن تخصيصها بالكامل في صفحة الخبير.'},itinsFeatures:{fr:'<strong>Fonctionnalités :</strong>',en:'<strong>Features:</strong>',es:'<strong>Características:</strong>',it:'<strong>Funzioni:</strong>',pt:'<strong>Funcionalidades:</strong>',ar:'<strong>الميزات:</strong>'},itinsFeaturesList:{fr:['Accédez à tous les itinéraires disponibles avec leurs titres et descriptions','Filtrez par destination, durée, type de voyage ou autres critères','Consultez les itinéraires au format guide de voyage attractif','Sélectionnez un itinéraire pour l\'explorer ou le modifier'],en:['Access all available itineraries with their titles and descriptions','Filter by destination, duration, travel type or other criteria','View itineraries in an attractive travel guide format','Select an itinerary to explore or modify it'],es:['Acceda a todos los itinerarios disponibles con sus títulos y descripciones','Filtre por destino, duración, tipo de viaje u otros criterios','Vea los itinerarios en un formato de guía de viaje atractivo','Seleccione un itinerario para explorarlo o modificarlo'],it:['Accedi a tutti gli itinerari disponibili con i loro titoli e descrizioni','Filtra per destinazione, durata, tipo di viaggio o altri criteri','Visualizza gli itinerari in un formato guida di viaggio attraente','Seleziona un itinerario per esplorarlo o modificarlo'],pt:['Acesse todos os itinerários disponíveis com seus títulos e descrições','Filtre por destino, duração, tipo de viagem ou outros critérios','Visualize os itinerários em um formato de guia de viagem atraente','Selecione um itinerário para explorar ou modificá-lo'],ar:['الوصول إلى جميع المسارات المتاحة مع عناوينها ووصفاتها','التصفية حسب الوجهة والمدة ونوع السفر أو معايير أخرى','عرض المسارات بصيغة دليل سفر جذاب','حدد مسارًا لاستكشافه أو تعديله']},itinsExplore:{fr:'Parcourez notre galerie d\'itinéraires pour découvrir votre prochaine destination ! Chaque guide offre une vision complète et inspirante de votre voyage.',en:'Browse our itinerary gallery to discover your next destination! Each guide offers a complete and inspiring vision of your journey.',es:'¡Explore nuestra galería de itinerarios para descubrir su próximo destino! Cada guía ofrece una visión completa e inspiradora de su viaje.',it:'Sfoglia la nostra galleria di itinerari per scoprire la tua prossima destinazione! Ogni guida offre una visione completa e stimolante del tuo viaggio.',pt:'Procure na nossa galeria de itinerários para descobrir seu próximo destino! Cada guia oferece uma visão completa e inspiradora da sua jornada.',ar:'تصفح معرض المسارات الخاص بنا لاكتشاف وجهتك التالية! يقدم كل دليل رؤية شاملة وملهمة لرحلتك.'},itinsExpertCTA:{fr:'→ Pour plus de fonctionnalités, passez en <strong>Mode Simple</strong> ou au <strong>Mode Expert</strong>',en:'→ For more features, switch to <strong>Simple Mode</strong> or <strong>Expert Mode</strong>',es:'→ Para más funciones, cambie al <strong>Modo Simple</strong> o al <strong>Modo Experto</strong>',it:'→ Per più funzioni, passa alla <strong>Modalità Semplice</strong> o <strong>Modalità Esperto</strong>',pt:'→ Para mais recursos, mude para o <strong>Modo Simples</strong> ou <strong>Modo Expert</strong>',ar:'→ لمزيد من الميزات، انتقل إلى <strong>الوضع البسيط</strong> أو <strong>وضع الخبير</strong>'},visionTitle:{fr:'Lilia - Vision',en:'Lilia - Vision',es:'Lilia - Visión',it:'Lilia - Visione',pt:'Lilia - Visão',ar:'ليليا - الرؤية'},visionDesc:{fr:'Prenez une photo et demandez à notre IA de vous raconter une œuvre, un monument, un lieu ou de traduire un menu. Limité à deux photos par jour. OneRoadTrip est gratuit et nous payons l\'IA... Pensez à réserver via nos liens sponsorisés, cela nous permettra de continuer à exister. Uniquement disponible sur mobile.',en:'Take a photo and ask our AI to tell you about a artwork, a monument, a place or translate a menu. Limited to two photos per day. OneRoadTrip is free and we pay for the AI... Please book through our sponsored links, this will help us continue to exist. Available on mobile only.',es:'Toma una foto y pide a nuestra IA que te cuente sobre una obra de arte, un monumento, un lugar o traduzca un menú. Limitado a dos fotos por día. OneRoadTrip es gratuito y pagamos la IA... Por <script>

    // Langues supportées
    const SUP=["fr","en","it","es","pt","ar"];
    
    // Détection améliorée de la langue
    const urlLang = new URL(location.href).searchParams.get("lang");
    const storedLang = localStorage.getItem("lang");
    const userChoseLang = localStorage.getItem("langUserChoice") === "true"; // L'utilisateur a-t-il choisi explicitement ?
    
    // Détection de la langue du navigateur (supporte fr-FR, fr-CA, etc.)
    const navLangs = navigator.languages || [navigator.language || "fr"];
    let browserLang = "en"; // fallback
    for(const nl of navLangs){
      const code = nl.slice(0,2).toLowerCase();
      if(SUP.includes(code)){ browserLang = code; break; }
    }
    
    // Ordre de priorité :
    // 1. Paramètre URL explicite (?lang=xx)
    // 2. Choix utilisateur stocké (seulement si l'utilisateur a cliqué sur un sélecteur de langue)
    // 3. Langue du navigateur
    let lang;
    if(urlLang && SUP.includes(urlLang.slice(0,2).toLowerCase())){
      lang = urlLang.slice(0,2).toLowerCase();
      // Si URL explicite, on considère que c'est un choix utilisateur
      localStorage.setItem("lang", lang);
      localStorage.setItem("langUserChoice", "true");
    } else if(userChoseLang && storedLang && SUP.includes(storedLang)){
      lang = storedLang;
    } else {
      lang = browserLang;
      localStorage.setItem("lang", lang);
      // On ne met PAS langUserChoice à true ici - c'est automatique
    }
    
    if(!SUP.includes(lang)) lang = "en";
    document.documentElement.lang = lang;

    // Animation des 3 compteurs synchronisés (durée fixe 4000 ms)
    function animateCounters(nodes, targets, duration=4000){
      const easeOutCubic = t => 1 - Math.pow(1 - t, 3); // doux, finit proprement
      const start = performance.now();

      function frame(now){
        const p = Math.min(1, (now - start) / duration);
        const e = easeOutCubic(p);
        nodes.forEach((el, i)=>{
          const val = Math.floor(targets[i] * e);
          el.textContent = fmt(val);
        });
        if(p < 1) requestAnimationFrame(frame);
        else nodes.forEach((el, i)=> el.textContent = fmt(targets[i])); // clamp exact à la fin
      }
      requestAnimationFrame(frame);
    }

          let autoplayInterval = setInterval(() => navigateTo(currentIndex + 1), 5000);

          container.addEventListener('mouseenter', () => clearInterval(autoplayInterval));
          container.addEventListener('mouseleave', resetAutoplay);
          
          console.log('[CAROUSEL] Initialisé avec', itineraries.length, 'itinéraires');
        } catch (err) {
          console.log('[CAROUSEL] Erreur:', err.message);
        }
      })();

      // Fonction pour créer et afficher un modal
      function showModal(title, text, onConfirm){
        const overlay = document.createElement("div");
        overlay.className = "modal-overlay";
        overlay.innerHTML = `
          <div class="modal-content">
            <h2 class="modal-title">${title}</h2>
            <p class="modal-text">${text}</p>
            <div class="modal-actions">
              <button class="modal-btn secondary" data-action="cancel">${t.modal_cancel}</button>
              <button class="modal-btn primary" data-action="confirm">${t.modal_continue}</button>
            </div>
          </div>
        `;
        document.body.appendChild(overlay);
        
        setTimeout(()=> overlay.classList.add("show"), 10);
        
        overlay.addEventListener("click", (e)=>{
          if(e.target === overlay || e.target.dataset.action === "cancel"){
            overlay.classList.remove("show");
            setTimeout(()=> overlay.remove(), 200);
          } else if(e.target.dataset.action === "confirm"){
            overlay.classList.remove("show");
            setTimeout(()=> overlay.remove(), 200);
            onConfirm();
          }
        });
      }

      // Fonction pour afficher la modale Comment ça marche
      function openHelpModal(){
        console.log('[DEBUG] openHelpModal() innerWidth:', window.innerWidth, '> 1024?', window.innerWidth > 1024);
        if(window.innerWidth > 1024){

          console.log('[DEBUG] Desktop mode - affichant showHowModal()');
          showHowModal();
        } else {

          console.log('[DEBUG] Mobile mode - affichant modale onglets');

            modal.className = 'mode-info-modal';

                html += `</ul><p>${window.ORT_I18N_MODES.expertBeforeTitle[lang]}</p><ul class="mode-info-list">`;

                html += `</ul>`;
              } else if(mode === 'itins'){
                html = `<h2>${window.ORT_I18N_MODES.itinsTitle[lang]}</h2><p>${window.ORT_I18N_MODES.itinsDesc[lang]}</p><p>${window.ORT_I18N_MODES.itinsFeatures[lang]}</p><ul class="mode-info-list">`;

              }
              body.innerHTML = html;
              console.log('[DEBUG] Contenu HTML ajouté pour', mode);
            }
            
            modal.querySelector('.mode-info-close').addEventListener('click', ()=> modal.classList.remove('active'));
            modal.addEventListener('click', (e)=> {if(e.target === modal) modal.classList.remove('active')});

              tab.addEventListener('click', () => showTab(tab.dataset.tab));
            });
            
            showTab('expert');
          } else {
            console.log('[DEBUG] Modale mobile existe déjà');
          }
          
          modal.classList.add('active');
        }
      }

      function showHowModal(){
        console.log('[DEBUG] showHowModal() appelée');
        const overlay = document.createElement("div");
        overlay.className = "how-modal-overlay";
        overlay.innerHTML = `
          <div class="how-modal">
            <div class="how-modal-header">
              <h2>${t.how_title}</h2>
              <button class="how-modal-close" aria-label="Fermer">×</button>
            </div>

      // ============================================
      // HANDLERS DES 4 CARRÉS + ROUTE BUILDER + BOUTONS
      // ============================================
      const ITIN_FOLDERS = { fr:"static-pages/fr/itineraires", en:"static-pages/en/itineraries", it:"static-pages/it/itinerari", es:"static-pages/es/rutas", pt:"static-pages/pt/roteiros", ar:"static-pages/ar/masar" };
      
      // 4 carrés
      document.getElementById('cardMap')?.addEventListener('click', ()=>{
        window.location.href = `pres_simple.html?lang=${lang}`;
      });
      document.getElementById('cardBuild')?.addEventListener('click', ()=>{
        window.location.href = `carte_builder.html?lang=${lang}&mode=expert`;
      });
      document.getElementById('cardImport')?.addEventListener('click', ()=>{
        window.location.href = `import.html?lang=${lang}`;
      });
      document.getElementById('cardItins')?.addEventListener('click', ()=>{
        window.location.href = (ITIN_FOLDERS[lang] || ITIN_FOLDERS.en) + "/index.html";
      });
      
      // Hover sur les carrés
      document.querySelectorAll('.action-card').forEach(card => {
        card.addEventListener('mouseenter', ()=>{ card.style.transform='translateY(-3px)'; card.style.boxShadow='0 8px 20px rgba(0,0,0,0.3)'; });
        card.addEventListener('mouseleave', ()=>{ card.style.transform=''; card.style.boxShadow=''; });
      });
      
      // Boutons hero : Vos voyages, Contact, Vision
      document.getElementById('btnTripsHero')?.addEventListener('click', ()=>{
        window.location.href = `dashboard_user.html?lang=${lang}`;
      });
      document.getElementById('btnContactHero')?.addEventListener('click', ()=>{
        showModeInfoModal('contact');
      });

      // Modale Contact simplifiée
      function showModeInfoModal(mode) {
        if (!window.ORT_I18N_MODES) return;
        const modal = document.createElement('div');
        modal.className = 'mode-info-modal';
        modal.innerHTML = '<div class="mode-info-content"><button class="mode-info-close" aria-label="Fermer">×</button><div class="mode-info-body"></div></div>';
        document.body.appendChild(modal);
        const body = modal.querySelector('.mode-info-body');
        body.innerHTML = '<h2>'+window.ORT_I18N_MODES.contactTitle[lang]+'</h2><p>'+window.ORT_I18N_MODES.contactDesc[lang]+'</p><form id="contactForm" style="margin-top:15px"><div style="margin-bottom:12px"><label style="display:block;margin-bottom:4px;font-weight:bold">'+window.ORT_I18N_MODES.contactFormName[lang]+'</label><input type="text" id="contactName" required style="width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;font-size:14px"></div><div style="margin-bottom:12px"><label style="display:block;margin-bottom:4px;font-weight:bold">'+window.ORT_I18N_MODES.contactFormEmail[lang]+'</label><input type="email" id="contactEmail" required style="width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;font-size:14px"></div><div style="margin-bottom:12px"><label style="display:block;margin-bottom:4px;font-weight:bold">'+window.ORT_I18N_MODES.contactFormSubject[lang]+'</label><input type="text" id="contactSubject" required style="width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;font-size:14px"></div><div style="margin-bottom:12px"><label style="display:block;margin-bottom:4px;font-weight:bold">'+window.ORT_I18N_MODES.contactFormMessage[lang]+'</label><textarea id="contactMessage" required style="width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;font-size:14px;min-height:80px;resize:vertical"></textarea></div><button type="submit" id="contactSubmit" style="background:#14b8a6;color:white;border:none;padding:10px 20px;border-radius:4px;cursor:pointer;font-weight:bold;width:100%">'+window.ORT_I18N_MODES.contactFormSend[lang]+'</button></form><div id="contactStatus" style="margin-top:12px;padding:10px;border-radius:4px;display:none;text-align:center"></div>';
        body.querySelector('#contactForm').addEventListener('submit', async(e)=>{e.preventDefault();const sb=body.querySelector('#contactSubmit');sb.disabled=true;sb.textContent='...';try{const r=await fetch('https://api.emailjs.com/api/v1.0/email/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({service_id:'service_9bdqzog',template_id:'template_f1eynm7',user_id:'ofOAMANfqdxM-tQsH',template_params:{name:body.querySelector('#contactName').value,email:body.querySelector('#contactEmail').value,title:body.querySelector('#contactSubject').value,message:body.querySelector('#contactMessage').value}})});if(r.ok){body.querySelector('#contactStatus').style.display='block';body.querySelector('#contactStatus').style.backgroundColor='#d4edda';body.querySelector('#contactStatus').style.color='#155724';body.querySelector('#contactStatus').textContent=window.ORT_I18N_MODES.contactFormSuccess[lang];body.querySelector('#contactForm').style.display='none'}else throw new Error('HTTP '+r.status)}catch(err){body.querySelector('#contactStatus').style.display='block';body.querySelector('#contactStatus').style.backgroundColor='#f8d7da';body.querySelector('#contactStatus').style.color='#721c24';body.querySelector('#contactStatus').textContent=(window.ORT_I18N_MODES.contactFormError[lang]||'Error')+' ('+err.message+')';sb.disabled=false;sb.textContent=window.ORT_I18N_MODES.contactFormSend[lang]}});
        modal.querySelector('.mode-info-close').addEventListener('click',()=>{modal.classList.remove('active');setTimeout(()=>modal.remove(),300)});
        modal.addEventListener('click',(e)=>{if(e.target===modal){modal.classList.remove('active');setTimeout(()=>modal.remove(),300)}});
        setTimeout(()=>modal.classList.add('active'),10);
      }
      // Vision : visible uniquement en mobile
      if (window.innerWidth <= 768) {
        const vBtn = document.getElementById('btnVisionHero');
        if (vBtn) vBtn.style.display = 'inline-flex';
      }
      document.getElementById('btnVisionHero')?.addEventListener('click', handleLiliaClick);
      
      // Route Builder - autocomplete
      const SEARCH_API = (() => {
        const host = window.location.hostname;
        if (host === 'localhost' || host === '127.0.0.1' || host.match(/^192\.168\./)) return 'http://localhost:3031';
        return '/.netlify/functions';
      })();
      
      let idxStartCity = null;
      let idxEndCity = null;
      
      function debounceIdx(fn, ms) {
        let timer;
        return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
      }
      
      async function searchCitiesIdx(query) {
        if (!query || query.length < 2) return [];
        try {
          const res = await fetch(`${SEARCH_API}/citysearch?q=${encodeURIComponent(query)}&lang=${lang}&limit=8`);
          if (!res.ok) return [];
          const data = await res.json();
          return data.items || [];
        } catch(e) { return []; }
      }
      
      function showSuggestionsIdx(containerId, items, onSelect) {
        const container = document.getElementById(containerId);
        if (!container) return;
        if (!items.length) { container.style.display = 'none'; return; }
        container.innerHTML = items.map((item, i) => `
          <div data-index="${i}" style="padding:10px 12px;cursor:pointer;border-bottom:1px solid #eee;font-size:14px;display:flex;justify-content:space-between;">
            <span>${item.name}</span>
            <span style="color:#666;font-size:12px;">${item.countryCode || ''}</span>
          </div>
        `).join('');
        container.style.display = 'block';
        container.querySelectorAll('div').forEach(div => {
          div.addEventListener('click', () => {
            onSelect(items[parseInt(div.dataset.index)]);
            container.style.display = 'none';
          });
        });
      }
      
      const inputStart = document.getElementById('idxStartCity');
      const inputEnd = document.getElementById('idxEndCity');
      
      if (inputStart) {
        inputStart.addEventListener('input', debounceIdx(async () => {
          idxStartCity = null;
          const items = await searchCitiesIdx(inputStart.value);
          showSuggestionsIdx('idxStartSuggestions', items, (city) => { idxStartCity = city; inputStart.value = city.name; });
        }, 300));
      }
      if (inputEnd) {
        inputEnd.addEventListener('input', debounceIdx(async () => {
          idxEndCity = null;
          const items = await searchCitiesIdx(inputEnd.value);
          showSuggestionsIdx('idxEndSuggestions', items, (city) => { idxEndCity = city; inputEnd.value = city.name; });
        }, 300));
      }
      
      // Circuit mode
      const idxLoop = document.getElementById('idxLoopMode');
      const idxEndCont = document.getElementById('idxEndContainer');
      if (idxLoop && idxEndCont) {
        idxLoop.addEventListener('change', () => { idxEndCont.style.display = idxLoop.checked ? 'none' : 'block'; });
      }
      
      // Soumission route builder
      document.getElementById('idxGenerate')?.addEventListener('click', async () => {
        const btn = document.getElementById('idxGenerate');
        const startText = inputStart?.value?.trim();
        const endText = inputEnd?.value?.trim();
        const isLoop = idxLoop?.checked || false;
        if (!startText) { inputStart?.focus(); return; }
        if (!isLoop && !endText) { inputEnd?.focus(); return; }
        let finalStart = idxStartCity;
        let finalEnd = isLoop ? null : idxEndCity;
        if (!finalStart || !finalStart.lat) {
          const results = await searchCitiesIdx(startText);
          finalStart = results.length > 0 ? results[0] : { name: startText, lat: null, lon: null };
        }
        if (!isLoop && (!finalEnd || !finalEnd.lat)) {
          const results = await searchCitiesIdx(endText);
          finalEnd = results.length > 0 ? results[0] : { name: endText, lat: null, lon: null };
        }
        const params = new URLSearchParams({
          from: 'builder', startName: finalStart.name, startLat: finalStart.lat || '', startLon: finalStart.lon || '',
          startCC: finalStart.countryCode || '', endName: isLoop ? finalStart.name : (finalEnd?.name || ''),
          endLat: isLoop ? finalStart.lat : (finalEnd?.lat || ''), endLon: isLoop ? finalStart.lon : (finalEnd?.lon || ''),
          endCC: isLoop ? finalStart.countryCode : (finalEnd?.countryCode || ''),
          maxKm: document.getElementById('idxMaxKm').value, detour: document.getElementById('idxDetour').value,
          days: document.getElementById('idxDuration').value, lang: lang
        });
        if (isLoop) params.set('loop', '1');
        btn.textContent = t.rb_generating;
        btn.disabled = true;
        setTimeout(() => { window.location.href = `roadtrip_detail.html?${params.toString()}`; }, 500);
      });
      
      // Fermer suggestions au clic extérieur
      document.addEventListener('click', (e) => {
        if (!e.target.closest('#idxStartCity') && !e.target.closest('#idxStartSuggestions')) {
          const el = document.getElementById('idxStartSuggestions'); if(el) el.style.display = 'none';
        }
        if (!e.target.closest('#idxEndCity') && !e.target.closest('#idxEndSuggestions')) {
          const el = document.getElementById('idxEndSuggestions'); if(el) el.style.display = 'none';
        }
      });
      
      // Lilia (Vision)
      function goToLilia(){ window.location.href = `vision-photo.html?lang=${lang}`; }
      function handleLiliaClick(){
        if(!localStorage.getItem('liliaWelcomeSeen')){
          const overlay = document.createElement("div");
          overlay.className = "modal-overlay";
          overlay.innerHTML = `<div class="modal-content"><h2 class="modal-title">${t.lilia_welcome_title}</h2><p class="modal-text">${t.lilia_welcome_text}</p><div class="modal-actions"><button class="modal-btn primary" data-action="confirm">${t.modal_continue}</button></div></div>`;
          document.body.appendChild(overlay);
          setTimeout(()=> overlay.classList.add("show"), 10);
          overlay.addEventListener("click", (e)=>{
            if(e.target === overlay || e.target.dataset.action === "confirm"){
              localStorage.setItem('liliaWelcomeSeen', '1');
              overlay.classList.remove("show");
              setTimeout(()=> { overlay.remove(); goToLilia(); }, 200);
            }
          });
        } else { goToLilia(); }
      }
      
      
      console.log('[TRACE] DOMContentLoaded - END');
    });
  })();
  </script>
