<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionnaire de Photos JSON</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
        img[src*="istockphoto"] { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function PhotoManager() {
            const [jsonData, setJsonData] = useState(null);
            const [fileName, setFileName] = useState('');
            const [fileType, setFileType] = useState('');
            const [searchTerm, setSearchTerm] = useState('');
            const [filter, setFilter] = useState('all');
            const [newUrls, setNewUrls] = useState({}); // Store new URLs by photo ID

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const data = JSON.parse(event.target.result);
                            setJsonData(data);
                            setFileName(file.name);
                            
                            const firstKey = Object.keys(data)[0];
                            if (data[firstKey].hasOwnProperty('country')) {
                                setFileType('rt');
                            } else if (data[firstKey].hasOwnProperty('name')) {
                                setFileType('lieux');
                            }
                            
                            setNewUrls({});
                        } catch (error) {
                            alert('Erreur lors de la lecture du fichier JSON');
                        }
                    };
                    reader.readAsText(file);
                }
            };

            const getAllPhotos = () => {
                if (!jsonData) return [];
                
                const photos = [];
                Object.entries(jsonData).forEach(([key, value]) => {
                    if (value.photos && Array.isArray(value.photos)) {
                        value.photos.forEach((url, index) => {
                            const [country, location] = key.split('::');
                            
                            photos.push({
                                id: `${key}::${index}`,
                                locationKey: key,
                                photoIndex: index,
                                url: url,
                                country: fileType === 'rt' ? value.country : country,
                                region: fileType === 'rt' ? value.region : '',
                                locationName: fileType === 'lieux' ? value.name : value.region,
                                fullLocation: fileType === 'lieux' 
                                    ? `${country} - ${value.name}`
                                    : `${value.country} - ${value.region}`
                            });
                        });
                    }
                });
                
                return photos;
            };

            const filteredPhotos = getAllPhotos().filter(photo => {
                const matchesSearch = photo.fullLocation.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                     photo.locationName.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                     photo.url.toLowerCase().includes(searchTerm.toLowerCase());
                
                const hasNewUrl = newUrls[photo.id] && newUrls[photo.id].trim() !== '';
                
                if (filter === 'modified') {
                    return matchesSearch && hasNewUrl;
                } else if (filter === 'unmodified') {
                    return matchesSearch && !hasNewUrl;
                }
                
                return matchesSearch;
            });

            const handleNewUrlChange = (photoId, newUrl) => {
                setNewUrls(prev => ({
                    ...prev,
                    [photoId]: newUrl
                }));
            };

            const createBackupAndDownload = () => {
                const modifiedCount = Object.keys(newUrls).filter(id => newUrls[id].trim() !== '').length;
                
                if (modifiedCount === 0) {
                    alert('❌ Aucune modification à sauvegarder !');
                    return;
                }

                // Create backup of original
                const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, -5);
                const backupFileName = fileName.replace('.json', `_backup_${timestamp}.json`);
                const backupDataStr = JSON.stringify(jsonData, null, 2);
                const backupBlob = new Blob([backupDataStr], { type: 'application/json' });
                const backupUrl = URL.createObjectURL(backupBlob);
                const backupLink = document.createElement('a');
                backupLink.href = backupUrl;
                backupLink.download = backupFileName;
                backupLink.click();
                URL.revokeObjectURL(backupUrl);

                // Create modified version
                const newData = JSON.parse(JSON.stringify(jsonData));
                
                Object.entries(newUrls).forEach(([photoId, newUrl]) => {
                    if (newUrl.trim() !== '') {
                        // Split from the last :: to handle keys like "ES::savina::0"
                        const lastIndex = photoId.lastIndexOf('::');
                        const locationKey = photoId.substring(0, lastIndex);
                        const index = parseInt(photoId.substring(lastIndex + 2));
                        
                        if (newData[locationKey] && newData[locationKey].photos) {
                            newData[locationKey].photos[index] = newUrl.trim();
                        }
                    }
                });

                const newDataStr = JSON.stringify(newData, null, 2);
                const newBlob = new Blob([newDataStr], { type: 'application/json' });
                const newUrl = URL.createObjectURL(newBlob);
                const newLink = document.createElement('a');
                newLink.href = newUrl;
                newLink.download = fileName;
                newLink.click();
                URL.revokeObjectURL(newUrl);

                alert(`✅ Backup créé : ${backupFileName}\n✅ Nouveau fichier créé : ${fileName}\n\n${modifiedCount} photo(s) modifiée(s) !`);
            };

            const stats = {
                total: getAllPhotos().length,
                modified: Object.keys(newUrls).filter(id => newUrls[id] && newUrls[id].trim() !== '').length,
                unmodified: getAllPhotos().length - Object.keys(newUrls).filter(id => newUrls[id] && newUrls[id].trim() !== '').length
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-6 pb-32">
                    <div className="max-w-7xl mx-auto">
                        <div className="bg-white rounded-xl shadow-2xl p-8">
                            <h1 className="text-4xl font-bold text-gray-800 mb-2">
                                📷 Gestionnaire de Photos JSON
                            </h1>
                            <p className="text-gray-600 mb-6">Gérez vos photos en masse facilement</p>

                            {!jsonData ? (
                                <div className="text-center py-16">
                                    <div className="text-6xl mb-4">📤</div>
                                    <label className="cursor-pointer inline-block">
                                        <input
                                            type="file"
                                            accept=".json"
                                            onChange={handleFileUpload}
                                            className="hidden"
                                        />
                                        <span className="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-lg font-semibold transition-colors inline-block">
                                            Charger un fichier JSON
                                        </span>
                                    </label>
                                    <p className="text-gray-500 mt-4">photos_lieux.json ou photos_rt.json</p>
                                </div>
                            ) : (
                                <>
                                    <div className="grid grid-cols-3 gap-4 mb-6">
                                        <div className="bg-blue-50 p-4 rounded-lg">
                                            <div className="text-2xl font-bold text-blue-600">{stats.total}</div>
                                            <div className="text-sm text-gray-600">Total photos</div>
                                        </div>
                                        <div className="bg-orange-50 p-4 rounded-lg">
                                            <div className="text-2xl font-bold text-orange-600">{stats.modified}</div>
                                            <div className="text-sm text-gray-600">Modifiées</div>
                                        </div>
                                        <div className="bg-gray-50 p-4 rounded-lg">
                                            <div className="text-2xl font-bold text-gray-600">{stats.unmodified}</div>
                                            <div className="text-sm text-gray-600">Non modifiées</div>
                                        </div>
                                    </div>

                                    <div className="space-y-4 mb-6">
                                        <div className="flex gap-3 items-center">
                                            <input
                                                type="text"
                                                placeholder="🔍 Rechercher par lieu ou URL..."
                                                value={searchTerm}
                                                onChange={(e) => setSearchTerm(e.target.value)}
                                                className="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                                            />
                                            <select
                                                value={filter}
                                                onChange={(e) => setFilter(e.target.value)}
                                                className="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
                                            >
                                                <option value="all">Toutes</option>
                                                <option value="modified">Modifiées</option>
                                                <option value="unmodified">Non modifiées</option>
                                            </select>
                                        </div>

                                        <button
                                            onClick={() => {
                                                const input = document.createElement('input');
                                                input.type = 'file';
                                                input.accept = '.json';
                                                input.onchange = handleFileUpload;
                                                input.click();
                                            }}
                                            className="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition-colors"
                                        >
                                            📂 Charger un autre fichier
                                        </button>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-6 max-h-[600px] overflow-y-auto p-2">
                                        {filteredPhotos.map((photo) => {
                                            const hasNewUrl = newUrls[photo.id] && newUrls[photo.id].trim() !== '';
                                            
                                            return (
                                                <div
                                                    key={photo.id}
                                                    className={`border-2 rounded-lg p-4 transition-all ${
                                                        hasNewUrl
                                                            ? 'border-orange-500 bg-orange-50'
                                                            : 'border-gray-200'
                                                    }`}
                                                >
                                                    <div className="flex-1 min-w-0">
                                                        <img
                                                            src={photo.url}
                                                            alt={photo.locationName}
                                                            className="w-full h-32 object-cover rounded mb-2"
                                                            crossOrigin="anonymous"
                                                            onError={(e) => {
                                                                e.target.style.display = 'none';
                                                                e.target.nextElementSibling.style.display = 'flex';
                                                            }}
                                                        />
                                                        <div className="w-full h-32 bg-gradient-to-br from-purple-400 to-pink-400 rounded mb-2 items-center justify-center text-white font-semibold hidden">
                                                            🔒 Image protégée
                                                        </div>
                                                        
                                                        <button
                                                            onClick={() => window.open(photo.url, '_blank')}
                                                            className="w-full mb-2 px-3 py-1.5 bg-blue-500 text-white text-sm rounded hover:bg-blue-600 transition-colors"
                                                        >
                                                            👁️ Voir l'image actuelle
                                                        </button>
                                                        
                                                        <div className="bg-gray-50 p-2 rounded mb-2">
                                                            <div className="text-xs font-semibold text-indigo-600 mb-1">
                                                                🌍 {photo.country}
                                                            </div>
                                                            <div className="font-semibold text-gray-800">
                                                                {photo.locationName}
                                                            </div>
                                                        </div>
                                                        
                                                        <div className="text-xs text-gray-500 mb-2">
                                                            📸 Photo {photo.photoIndex + 1}
                                                        </div>
                                                        
                                                        <div className="bg-yellow-50 border border-yellow-300 rounded p-2">
                                                            <label className="text-xs font-semibold text-gray-700 mb-1 block">
                                                                🔗 Nouvelle URL (optionnel) :
                                                            </label>
                                                            <input
                                                                type="text"
                                                                placeholder="https://..."
                                                                value={newUrls[photo.id] || ''}
                                                                onChange={(e) => handleNewUrlChange(photo.id, e.target.value)}
                                                                className="w-full px-2 py-1.5 text-sm border border-gray-300 rounded focus:ring-2 focus:ring-orange-500 focus:border-transparent"
                                                            />
                                                            {hasNewUrl && (
                                                                <div className="mt-1 text-xs text-orange-600 font-semibold">
                                                                    ✓ Sera remplacée
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>

                                    {filteredPhotos.length === 0 && (
                                        <div className="text-center py-12 text-gray-500">
                                            Aucune photo trouvée
                                        </div>
                                    )}
                                </>
                            )}
                        </div>
                    </div>

                    {/* Floating button */}
                    {jsonData && stats.modified > 0 && (
                        <div className="fixed bottom-8 right-8 z-50">
                            <button
                                onClick={createBackupAndDownload}
                                className="px-8 py-4 bg-gradient-to-r from-orange-500 to-red-500 text-white rounded-full hover:from-orange-600 hover:to-red-600 transition-all shadow-2xl font-bold text-lg flex items-center gap-3 animate-pulse"
                            >
                                <span className="text-2xl">💾</span>
                                <div>
                                    <div>Créer nouveau JSON</div>
                                    <div className="text-sm opacity-90">{stats.modified} modification(s)</div>
                                </div>
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<PhotoManager />, document.getElementById('root'));
    </script>
</body>
</html>
