<!DOCTYPE html>
<html lang="fr">
<head>
<!-- ort-pwa-injected-v1 -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="OneRoadTrip">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png">
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js').catch(() => {});
    });
  }
</script>
<script src="/pwa-install-button.js" defer></script>
<!-- /ort-pwa-injected-v1 -->

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OneRoadTrip</title>
<meta name="description" content="Actualités, presse et partenaires de OneRoadTrip.">
<link rel="icon" href="/assets/symbol.webp">
<style>
:root{
  --ink:#113f7a;
  --acc:#113f7a;
  --bg:#f6f9fb;
  --card:#ffffff;
  --bd:#d4e0ea;
  --mut:#64748b;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--ink);
}

/* Header */
header{
  background:var(--acc);
  color:#fff;
  padding:12px 18px;
  display:flex;
  align-items:center;
  gap:12px;
}
header a.brand{display:flex;align-items:center;gap:10px;color:#fff;text-decoration:none;font-weight:800;font-size:17px}
header a.brand img{width:40px;height:40px;object-fit:contain;display:block}
header .spacer{flex:1}
header a.back{color:#fff;text-decoration:none;font-size:14px;border:1px solid rgba(255,255,255,.5);padding:7px 12px;border-radius:9px;white-space:nowrap}
header a.back:hover{background:rgba(255,255,255,.15)}

.hero{max-width:880px;margin:0 auto;padding:26px 18px 6px}
.hero h1{margin:0 0 4px;font-size:28px}
.hero p{margin:0;color:var(--mut);font-size:15px}

/* Onglets */
.tabs{max-width:880px;margin:18px auto 0;padding:0 18px;display:flex;gap:8px;flex-wrap:wrap}
.tab{
  padding:11px 26px;border-radius:12px 12px 0 0;cursor:pointer;font-weight:700;
  background:#e4edf5;color:var(--acc);border:1px solid var(--bd);border-bottom:none;
  transition:background .15s;white-space:nowrap;
}
.tab:hover{background:#d8e6f1}
.tab.active{background:var(--card);box-shadow:0 -3px 10px rgba(17,63,122,.08)}

.feed{max-width:880px;margin:0 auto;padding:18px;}
.feed-inner{background:var(--card);border:1px solid var(--bd);border-radius:0 14px 14px 14px;padding:18px}

/* Carte article */
.art{
  border:1px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:18px;
  background:#fff;box-shadow:0 2px 8px rgba(17,63,122,.06);
  opacity:0;transform:translateY(12px);animation:rise .5s ease forwards;
}
@keyframes rise{to{opacity:1;transform:none}}
/* contain + max-height : l'image entière est visible, jamais coupée salement */
.art img.cover{width:100%;height:auto;max-height:360px;object-fit:contain;background:#eef3f7;display:block}
.art .body{padding:16px 18px}
.art .date{font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--mut);font-weight:700}
.art h2{margin:6px 0 10px;font-size:21px;color:var(--ink)}
.art .content{font-size:15px;line-height:1.6;color:#374151}
.art .content h3{color:var(--ink);font-size:17px;margin:14px 0 6px}
.art .content a{color:#1565C0}

.empty{text-align:center;color:var(--mut);padding:40px 10px;font-size:15px}
.loading{text-align:center;color:var(--mut);padding:30px 10px;font-size:14px}

@media(max-width:600px){
  .hero h1{font-size:23px}
  .art img.cover{max-height:240px}
  .tab{padding:10px 16px}
}
</style>
</head>
<body>

<header>
  <a class="brand" id="homeLink" href="/index.html">
    <img src="/assets/symbol.webp" alt="OneRoadTrip"> OneRoadTrip
  </a>
  <span class="spacer"></span>
  <a class="back" id="backLink" href="/index.html">← Accueil</a>
</header>

<div class="hero">
  <h1 id="heroTitle">Actualités &amp; presse</h1>
  <p id="heroSub">Les dernières nouvelles de OneRoadTrip et ce que la presse en dit.</p>
</div>

<div class="tabs">
  <div class="tab active" data-tab="news" id="tabNews">📰 News</div>
  <div class="tab" data-tab="press" id="tabPress">🗞️ Presse</div>
  <div class="tab" data-tab="partners" id="tabPartners">🤝 Partenaires</div>
</div>

<div class="feed">
  <div class="feed-inner" id="feed">
    <div class="loading">…</div>
  </div>
</div>

<script>
/* ===== i18n ===== */
var SUPPORTED = ['fr','en','es','it','pt','ar'];
var currentLang = 'en';
(function(){
  var p = new URLSearchParams(location.search).get('lang');
  if (p && SUPPORTED.indexOf(p) !== -1){ currentLang = p; return; }
  var langs = navigator.languages || (navigator.language ? [navigator.language] : []);
  for (var i=0;i<langs.length;i++){
    var n = langs[i].slice(0,2).toLowerCase();
    if (SUPPORTED.indexOf(n) !== -1){ currentLang = n; return; }
  }
})();

var I18N = {
  fr:{title:'Actualités & presse',sub:'Les dernières nouvelles de OneRoadTrip et ce que la presse en dit.',news:'Actualités',press:'Presse',partners:'Partenaires',back:'← Accueil',loading:'Chargement…',empty:'Aucun article pour le moment.',locale:'fr-FR',pageTitle:'OneRoadTrip · Actualités & presse'},
  en:{title:'News & press',sub:'The latest from OneRoadTrip and what the press says about us.',news:'News',press:'Press',partners:'Partners',back:'← Home',loading:'Loading…',empty:'Nothing here yet.',locale:'en-GB',pageTitle:'OneRoadTrip · News & press'},
  es:{title:'Noticias y prensa',sub:'Las últimas novedades de OneRoadTrip y lo que dice la prensa.',news:'Noticias',press:'Prensa',partners:'Socios',back:'← Inicio',loading:'Cargando…',empty:'Aún no hay nada.',locale:'es-ES',pageTitle:'OneRoadTrip · Noticias y prensa'},
  it:{title:'Notizie e stampa',sub:'Le ultime novità di OneRoadTrip e cosa ne dice la stampa.',news:'Notizie',press:'Stampa',partners:'Partner',back:'← Home',loading:'Caricamento…',empty:'Ancora niente.',locale:'it-IT',pageTitle:'OneRoadTrip · Notizie e stampa'},
  pt:{title:'Notícias e imprensa',sub:'As últimas novidades da OneRoadTrip e o que a imprensa diz.',news:'Notícias',press:'Imprensa',partners:'Parceiros',back:'← Início',loading:'A carregar…',empty:'Ainda não há nada.',locale:'pt-PT',pageTitle:'OneRoadTrip · Notícias e imprensa'},
  ar:{title:'الأخبار والصحافة',sub:'آخر أخبار OneRoadTrip وما تقوله الصحافة عنّا.',news:'أخبار',press:'الصحافة',partners:'شركاء',back:'الرئيسية',loading:'جارٍ التحميل…',empty:'لا يوجد شيء بعد.',locale:'ar',pageTitle:'OneRoadTrip · الأخبار والصحافة'}
};
var T = I18N[currentLang] || I18N.en;

document.documentElement.lang = currentLang;
if (currentLang === 'ar') document.documentElement.dir = 'rtl';
document.title = T.pageTitle;
document.getElementById('heroTitle').textContent = T.title;
document.getElementById('heroSub').textContent = T.sub;
document.getElementById('tabNews').textContent = '📰 ' + T.news;
document.getElementById('tabPress').textContent = '🗞️ ' + T.press;
document.getElementById('tabPartners').textContent = '🤝 ' + T.partners;
document.getElementById('backLink').textContent = T.back;
document.getElementById('backLink').href = '/index.html?lang=' + currentLang;
document.getElementById('homeLink').href = '/index.html?lang=' + currentLang;

/* ===== Données ===== */
var SOURCES = {
  news:     'data/news/news.json',
  press:    'data/news/press.json',
  partners: 'data/news/partners.json'
};
var cache = {};
var currentTab = 'news';

async function loadTab(tab){
  if (cache[tab]) { render(tab); return; }
  document.getElementById('feed').innerHTML = '<div class="loading">' + T.loading + '</div>';
  try {
    var tries = [SOURCES[tab], './' + SOURCES[tab], '/' + SOURCES[tab]];
    var data = null;
    for (var i=0;i<tries.length;i++){
      try {
        var r = await fetch(tries[i], { cache:'no-store' });
        if (r.ok){ data = await r.json(); break; }
      } catch(e){}
    }
    cache[tab] = Array.isArray(data) ? data : [];
  } catch(e){ cache[tab] = []; }
  render(tab);
}

function render(tab){
  if (tab !== currentTab) return;
  var arr = (cache[tab] || []).slice().sort(function(a,b){ return a.date < b.date ? 1 : a.date > b.date ? -1 : 0; });
  var feed = document.getElementById('feed');
  if (arr.length === 0){
    feed.innerHTML = '<div class="empty">' + T.empty + '</div>';
    return;
  }
  feed.innerHTML = '';
  arr.forEach(function(a, i){
    var el = document.createElement('article');
    el.className = 'art';
    el.style.animationDelay = (i * 80) + 'ms';
    var img = a.image ? '<img class="cover" src="' + escapeAttr(a.image) + '" alt="' + escapeAttr(a.title||'') + '" loading="lazy">' : '';
    el.innerHTML =
      img +
      '<div class="body">' +
        '<div class="date">' + formatDate(a.date) + '</div>' +
        (a.title ? '<h2>' + escapeHtml(a.title) + '</h2>' : '') +
        '<div class="content">' + (a.body || '') + '</div>' +
      '</div>';
    feed.appendChild(el);
  });
}

document.querySelectorAll('.tab').forEach(function(t){
  t.addEventListener('click', function(){
    document.querySelectorAll('.tab').forEach(function(x){ x.classList.remove('active'); });
    t.classList.add('active');
    currentTab = t.dataset.tab;
    loadTab(currentTab);
  });
});

function formatDate(d){
  if (!d) return '';
  try { return new Date(d+'T00:00:00').toLocaleDateString(T.locale, {day:'numeric',month:'long',year:'numeric'}); }
  catch(e){ return d; }
}
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; });
}
function escapeAttr(s){ return escapeHtml(s); }

/* Ouvre l'onglet demandé via ?tab=news|press|partners (ou #ancre), sinon News. */
(function initTab(){
  var t = (new URLSearchParams(location.search).get('tab') || (location.hash||'').replace('#','') || 'news').toLowerCase();
  if (!SOURCES[t]) t = 'news';
  currentTab = t;
  document.querySelectorAll('.tab').forEach(function(x){ x.classList.toggle('active', x.dataset.tab === t); });
  loadTab(t);
})();
</script>
</body>
</html>
