  else document.addEventListener('DOMContentLoaded',function(){var t2=document.getElementById('site-header');if(t2)mo.observe(t2,{childList:true,subtree:true});});
})();

<script>
(function(){
  var langUrls={};
  document.querySelectorAll('link[hreflang]').forEach(function(el){
    var l=el.getAttribute('hreflang');
    if(l&&l!=='x-default'){
      try{var u=new URL(el.getAttribute('href'),window.location.origin);langUrls[l]=u.pathname;}catch(e){langUrls[l]=el.getAttribute('href');}
    }
  });
  document.addEventListener('change',function(e){
    var t=e.target;
    if(t.matches&&t.matches('.langpick,select[name="lang"]')){
      var newLang=t.value;
      if(langUrls[newLang]){e.preventDefault();window.location.href=langUrls[newLang];return;}
      var fb=langUrls.en||langUrls.fr;
      if(fb){e.preventDefault();window.location.href=fb;}
    }
  });
  document.addEventListener('click',function(e){
    var a=e.target.closest&&e.target.closest('a[data-lang],a.lang-link');
    if(!a)return;
    var newLang=a.dataset.lang||a.textContent.trim().substring(0,2).toLowerCase();
    if(langUrls[newLang]){e.preventDefault();window.location.href=langUrls[newLang];return;}
    var fb=langUrls.en||langUrls.fr;
    if(fb){e.preventDefault();window.location.href=fb;}
  });
})();
</script>
<script src="/js/ort-itin-editor.js" defer></script>
<script src="/js/ort-state-manager.js" defer></script>
<script>
(function(){
  var ITIN_ID='';
  var LANG='en';
  var urlParams=new URLSearchParams(window.location.search);
  var urlTripId=urlParams.get('tripId');
  if(!urlTripId){console.log('[ORT-SHELL] Pas de tripId, rien a afficher');return;}
  function loadScript(src){return new Promise(function(ok,ko){if(document.querySelector('script[src="'+src+'"]')){ok();return;}var s=document.createElement('script');s.src=src;s.onload=ok;s.onerror=ko;document.head.appendChild(s);});}
  function ensureFirebase(){
    if(window.firebase&&window.firebase.auth)return Promise.resolve();
    return loadScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js').then(function(){
      return loadScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js');
    }).then(function(){
      return loadScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js');
    }).then(function(){
      if(window.firebase.apps&&window.firebase.apps.length)return;
      var host=location.hostname;
      var isPre=/oneroadtrip-preprod|localhost|127\.0\.0\.1/.test(host);
      var cfg=isPre?(window.ORT_CONFIG&&ORT_CONFIG.PREPROD||{}):(window.ORT_CONFIG&&ORT_CONFIG.PROD||{});
      if(!cfg||!cfg.apiKey)cfg=(window.ORT_CONFIG&&ORT_CONFIG.PREPROD||{});
      window.__FIREBASE_CONFIG__=cfg;
      window.firebase.initializeApp(cfg);
      return window.firebase.auth().setPersistence(window.firebase.auth.Auth.Persistence.LOCAL);
    });
  }
  function tryRestore(){
    if(!window.ORT_STATE){console.warn('[ORT-SHELL] ORT_STATE absent');return;}
    ensureFirebase().then(function(){
    var unsub=firebase.auth().onAuthStateChanged(function(user){
      unsub();
      if(!user){console.warn('[ORT-SHELL] Non connecte');return;}
      window.ORT_STATE.init({user:user}).then(function(){
          console.log('[ORT-SHELL] tripId dans URL, chargement:',urlTripId);
          window.ORT_STATE.getTrip(urlTripId).then(function(trip){
            if(!trip||!trip.steps||!trip.steps.length){console.warn('[ORT-SHELL] Trip introuvable ou vide');return;}
            console.log('[ORT-SHELL] Trip charge:',trip.steps.length,'etapes');
            var _cc=(trip.cc||trip.country||'').toUpperCase();
            if(_cc){document.body.dataset.cc=_cc;}
            var _ccLow=_cc.toLowerCase();
            if(trip.title){document.title=trip.title+' | OneRoadTrip';}
            var _places=[];
            var _photos={};
            var _fetchJSON=function(u){return fetch(u).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});};
            var _pPlaces=_cc?_fetchJSON('/data/Roadtripsprefabriques/countries/'+_cc+'/'+_ccLow+'.places.master-'+LANG+'.json').then(function(d){
              if(!d)return _fetchJSON('/data/Roadtripsprefabriques/countries/'+_cc+'/'+_ccLow+'.places.master-en.json');
              return d;
            }).then(function(d){if(d)_places=d.places||d||[];console.log('[ORT-SHELL] Places:',_places.length);}):Promise.resolve();
            var _pPhotos=_fetchJSON('/data/photos-json/photos_lieux.json').then(function(d){if(d){_photos=d;console.log('[ORT-SHELL] Photos:',Object.keys(d).length);}});
            Promise.all([_pPlaces,_pPhotos]).then(function(){
            var _UI={fr:{step:'\u00c9tape',activities:'Activit\u00e9s',driveToNext:'Vers l\'\u00e9tape suivante'},en:{step:'Stop',activities:'Activities',driveToNext:'Drive to next stop'},es:{step:'Etapa',activities:'Actividades',driveToNext:'Trayecto siguiente'},pt:{step:'Etapa',activities:'Atividades',driveToNext:'Trajeto seguinte'},it:{step:'Tappa',activities:'Attivit\u00e0',driveToNext:'Tragitto successivo'},ar:{step:'\u0645\u062d\u0637\u0629',activities:'\u0623\u0646\u0634\u0637\u0629',driveToNext:'\u0627\u0644\u0637\u0631\u064a\u0642 \u0627\u0644\u062a\u0627\u0644\u064a'}};
            var _t=_UI[LANG]||_UI.fr;
            function _esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';}
            function _stars(r){if(!r||r<=0)return'';var n=Math.round(r/2);if(n<1)n=1;if(n>5)n=5;return'\u2605'.repeat(n)+'\u2606'.repeat(5-n);}
            function _drvT(m){if(!m)return'';var h=Math.floor(m/60),mn=m%60;return h>0?(mn>0?h+'h'+String(mn).padStart(2,'0'):h+'h'):mn+'min';}
            function _findPlace(pid){if(!pid)return null;for(var i=0;i<_places.length;i++){if(_places[i].place_id===pid)return _places[i];}return null;}
            function _getPhoto(pid){if(!pid)return null;if(_photos[pid]&&_photos[pid].photos&&_photos[pid].photos[0])return _photos[pid].photos[0];var pl=_findPlace(pid);if(pl&&pl.images&&pl.images[0])return pl.images[0];return null;}
            function _optImg(url,w){if(!url||url==='null')return null;if(url.startsWith('data:'))return url;w=w||600;return'https://wsrv.nl/?url='+encodeURIComponent(url)+'&w='+w+'&q=70&output=webp';}
            function _getRating(pid){var pl=_findPlace(pid);return pl?(pl.rating||0):0;}
            var stps=trip.steps;
            var html='';
            stps.forEach(function(step,idx){
              var dayNum=idx+1;
              var lat=step.lat||0;
              var lng=step.lng||step.lon||0;
              var pid=step.place_id||step.placeId||'';
              var rating=step.rating||_getRating(pid);
              var photoUrl=_optImg(_getPhoto(pid));
              html+='<section class="ds" id="day-'+dayNum+'" data-day="'+dayNum+'"';
              if(lat&&lng)html+=' data-lat="'+lat+'" data-lng="'+lng+'"';
              html+='>';
              html+='<div class="dh" onclick="sD('+dayNum+')">';
              html+='<div class="db">'+_t.step+' '+dayNum+'</div>';
              html+='<div class="di"><h3>'+_esc(step.name)+'</h3></div>';
              if(rating)html+='<div class="dr">'+_stars(rating)+'</div>';
              html+='</div>';
              if(photoUrl){html+='<div class="dp-inline"><img src="'+photoUrl+'" alt="'+_esc(step.name)+'" loading="lazy" width="600" height="200" onerror="this.parentNode.style.display=\'none\'"></div>';}
              var visits=step.visits||[];
              var activities=step.activities||[];
              if(visits.length||activities.length){
                html+='<div class="dd">';
                visits.forEach(function(v,vi){
                  var txt=v.text||v;
                  html+='<div class="vi"><div class="vm">'+(vi+1)+'</div><div class="vc"><p>'+_esc(txt)+'</p>';
                  if(v.visit_duration_min)html+='<span class="vd">\u23f1 '+v.visit_duration_min+' min</span>';
                  html+='</div></div>';
                });
                if(activities.length){
                  html+='<div class="ab"><h4>'+_t.activities+'</h4>';
                  activities.forEach(function(a){
                    var txt=a.text||a;
                    html+='<div class="ai"><p>'+_esc(txt)+'</p>';
                    if(a.activity_duration_min)html+='<span class="vd">\u23f1 '+a.activity_duration_min+' min</span>';
                    html+='</div>';
                  });
                  html+='</div>';
                }
                html+='</div>';
              }
              if(idx<stps.length-1&&step.to_next_leg&&step.to_next_leg.distance_km){
                html+='<div class="nl"><span>\ud83d\ude97</span><span>'+_esc(_t.driveToNext)+': <b>'+Math.round(step.to_next_leg.distance_km)+' km</b>';
                if(step.to_next_leg.drive_min)html+=' \u00b7 <b>'+_drvT(step.to_next_leg.drive_min)+'</b>';
                html+='</span></div>';
              }
              if(pid)html+='<div class="htl-ph" data-pid="'+_esc(pid)+'"></div>';
              html+='</section>';
            });
            var textPanel=document.getElementById('textPanel');
            if(textPanel)textPanel.innerHTML=html;
            (function(){
              var phs=document.querySelectorAll('.htl-ph[data-pid]');
              if(!phs.length)return;
              var pids=[];phs.forEach(function(el){pids.push(el.getAttribute('data-pid'));});
              function loadScript2(src){return new Promise(function(ok,ko){if(document.querySelector('script[src="'+src+'"]')){ok();return;}var s=document.createElement('script');s.src=src;s.onload=ok;s.onerror=ko;document.head.appendChild(s);});}
              var bkLang={fr:'fr',en:'en-gb',es:'es',pt:'pt-pt',it:'it',ar:'ar'};
              var bkSuf=bkLang[LANG]||'en-gb';
              function doLoad(){
                if(!window.ORT_HOTELS||!window.ORT_HOTELS.loadHotelsForMultiplePlaces)return;
                window.ORT_HOTELS.loadHotelsForMultiplePlaces(pids).then(function(results){
                  if(!results)return;
                  phs.forEach(function(el){
                    var pid2=el.getAttribute('data-pid');
                    var pd=results[pid2];
                    if(!pd||!pd.hotels||!pd.hotels.length)return;
                    var best=pd.hotels.slice().sort(function(a,b){return(b.score||0)-(a.score||0);})[0];
                    if(!best)return;
                    var hLink='#';
                    if(best.bookingUrl){var bm=best.bookingUrl.match(/https:\/\/www\.booking\.com\/hotel\/([a-z]{2})\/([^.?]+)/);if(bm)hLink='https://www.booking.com/hotel/'+bm[1]+'/'+bm[2]+'.'+bkSuf+'.html';}
                    var hImg=best.imageUrl?best.imageUrl.replace('square240','square600'):'';
                    el.innerHTML='<a class="htl-inline" href="'+hLink+'" target="_blank" rel="noopener sponsored">'+(hImg?'<img src="'+hImg+'" alt="'+_esc(best.name)+'" loading="lazy" width="70" height="70">':'')+'<div class="htl-info"><span class="htl-name">'+_esc(best.name)+'</span>'+(best.score?'<span class="htl-score">'+best.score+'</span>':'')+'</div></a>';
                  });
                  console.log('[ORT-SHELL] Hotels injectes');
                });
              }
              if(window.ORT_HOTELS){doLoad();}else{loadScript2('/js/ort-hotels.js').then(function(){setTimeout(doLoad,100);}).catch(function(){console.warn('[ORT-SHELL] ort-hotels.js non disponible');});}
            })();
            var newMP=[];
            stps.forEach(function(step,idx){
              var lat=step.lat||0;
              var lng=step.lng||step.lon||0;
              var pid=step.place_id||step.placeId||'';
              var photoUrl=_optImg(_getPhoto(pid));
              if(lat&&lng)newMP.push({day:idx+1,name:step.name||'',lat:lat,lng:lng,tag:'',photo:photoUrl||'',photoAlts:[],htl:null});
            });
            if(typeof mk==='object'){Object.keys(mk).forEach(function(k){try{map.removeLayer(mk[k]);}catch(e){}});mk={};}
            if(pl){try{map.removeLayer(pl);}catch(e){}pl=null;}
            MP=newMP;
            if(map&&MP.length>=2){
              var ll=MP.map(function(p){return[p.lat,p.lng];});
              pl=L.polyline(ll,{color:'#113f7a',weight:2,opacity:.3,dashArray:'5,10'}).addTo(map);
              if(typeof calculateOSRMRoute==='function'){
                calculateOSRMRoute(ll,'driving').then(function(result){
                  try{map.removeLayer(pl);}catch(e){}
                  if(result&&result.coordinates&&result.coordinates.length>1){pl=L.polyline(result.coordinates,{color:result.color||'#113f7a',weight:result.weight||3,opacity:.8,dashArray:result.dashArray||null}).addTo(map);}
                  else{pl=L.polyline(ll,{color:'#113f7a',weight:3,opacity:.7,dashArray:'8,6'}).addTo(map);}
                }).catch(function(){try{map.removeLayer(pl);}catch(e){}pl=L.polyline(ll,{color:'#113f7a',weight:3,opacity:.7,dashArray:'8,6'}).addTo(map);});
              }
            }
            if(map&&MP.length){
              var bd=L.latLngBounds(MP.map(function(p){return[p.lat,p.lng];}));
              MP.forEach(function(p){
                var m=L.marker([p.lat,p.lng],{icon:mkIcon(p.day,false),zIndexOffset:p.day}).addTo(map);
                m.bindTooltip('<strong>'+p.day+'. '+p.name+'</strong>',{direction:'top',offset:[0,-10],opacity:.95,className:'ort-tt'});
                m.on('click',function(){var el=document.getElementById('day-'+p.day);if(el){el.scrollIntoView({behavior:'smooth',block:'start'});hD(p.day);}});
                mk[p.day]=m;
              });
              map.fitBounds(bd.pad(0.1));
              initBd=bd;
            }
            if(typeof obs!=='undefined'){
              document.querySelectorAll('.ds').forEach(function(s){obs.observe(s);});
            }
            var _barMsgs={fr:'Votre itin\u00e9raire personnalis\u00e9',en:'Your customized itinerary',es:'Tu itinerario personalizado',pt:'Seu itiner\u00e1rio personalizado',it:'Il tuo itinerario personalizzato',ar:'\u0645\u0633\u0627\u0631\u0643 \u0627\u0644\u0645\u062e\u0635\u0635'};
            var _editMsgs={fr:'Modifier',en:'Edit',es:'Editar',pt:'Editar',it:'Modifica',ar:'\u062a\u0639\u062f\u064a\u0644'};
            var _editorMsgs={fr:'\u00c9diteur avanc\u00e9',en:'Advanced editor',es:'Editor avanzado',pt:'Editor avan\u00e7ado',it:'Editor avanzato',ar:'\u0627\u0644\u0645\u062d\u0631\u0631 \u0627\u0644\u0645\u062a\u0642\u062f\u0645'};
            var bar=document.createElement('div');
            bar.style.cssText='padding:8px 20px;background:linear-gradient(135deg,#f0f7ff,#e8f4fd);border-bottom:2px solid #d0dff0;text-align:center;font-size:.85rem;position:sticky;top:0;z-index:11000;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap';
            bar.innerHTML='<span style="color:#113f7a;font-weight:600">\u2728 '+(_barMsgs[LANG]||_barMsgs.en)+'</span>'+
              '<a href="/roadtrip_detail.html?tripId='+encodeURIComponent(urlTripId)+'&lang='+LANG+'" style="padding:5px 14px;border:none;border-radius:8px;background:#113f7a;color:#fff;cursor:pointer;font-weight:600;font-size:.82rem;text-decoration:none">\u270f\ufe0f '+(_editorMsgs[LANG]||_editorMsgs.en)+'</a>';
            document.body.insertBefore(bar,document.body.firstChild);
          });  // fin Promise.all().then
          }).catch(function(e){console.warn('[ORT-SHELL] Erreur:',e);});
      });
    });
    }).catch(function(e){console.warn('[ORT-SHELL] Firebase init error:',e);});
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',function(){setTimeout(tryRestore,2000);});
  else setTimeout(tryRestore,2000);
})();
</script>
