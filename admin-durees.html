<title>ORT Admin – Durées Itinéraires</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f5f5f5; color: #1a1a1a; }
  .header { background: #fff; border-bottom: 2px solid #e0e0e0; padding: 12px 20px; display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 16px; font-weight: 700; color: #333; white-space: nowrap; }
  .header-sub { font-size: 12px; color: #888; }
  #statusBar { padding: 8px 20px; font-size: 13px; display: none; }
  #statusBar.success { display: block; background: #e8f5e9; color: #2e7d32; }
  #statusBar.error { display: block; background: #ffebee; color: #c62828; }
  #statusBar.info { display: block; background: #e3f2fd; color: #1565c0; }

  .main { display: flex; height: calc(100vh - 53px); }

  /* Sidebar */
  .sidebar { width: 400px; min-width: 400px; border-right: 1px solid #ddd; display: flex; flex-direction: column; background: #fff; }
  .sidebar-header { padding: 12px; border-bottom: 1px solid #eee; }
  .sidebar-header select, .sidebar-header input { width: 100%; padding: 7px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; margin-top: 6px; }
  .sidebar-stats { display: flex; gap: 8px; padding: 8px 12px; border-bottom: 1px solid #eee; font-size: 11px; color: #666; flex-wrap: wrap; }
  .sidebar-stats span { background: #f5f5f5; padding: 3px 7px; border-radius: 3px; }
  .sidebar-stats b { color: #1565c0; }
  .sidebar-list { flex: 1; overflow-y: auto; padding: 6px; }

  .itin-item { padding: 8px 10px; border-radius: 4px; cursor: pointer; border: 1px solid transparent; margin-bottom: 2px; }
  .itin-item:hover { background: #f0f4ff; }
  .itin-item.selected { background: #e3f2fd; border-color: #90caf9; }
  .itin-item .title { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .itin-item .meta { font-size: 11px; color: #888; margin-top: 2px; display: flex; gap: 8px; align-items: center; }

  /* Badge durée */
  .badge { font-size: 10px; padding: 1px 6px; border-radius: 8px; font-weight: 600; }
  .badge-ok { background: #e8f5e9; color: #2e7d32; }
  .badge-warn { background: #ffebee; color: #c62828; }

  /* Indicateur d'écart dans la sidebar */
  .ecart { font-size: 10px; font-weight: 700; }
  .ecart-ok { color: #2e7d32; }
  .ecart-bad { color: #c62828; }

  /* Editor */
  .editor { flex: 1; overflow-y: auto; padding: 20px; background: #fafafa; }
  .editor-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #999; font-size: 14px; text-align: center; line-height: 2; }

  .section-title { font-size: 14px; font-weight: 600; color: #555; margin: 16px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #eee; }

  /* Bloc résumé durées */
  .dur-summary { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
  .dur-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .dur-row:last-child { margin-bottom: 0; }
  .dur-label { font-size: 13px; color: #666; min-width: 220px; }
  .dur-value { font-size: 15px; font-weight: 700; }
  .dur-value.ok { color: #2e7d32; }
  .dur-value.bad { color: #c62828; }
  .dur-value.neutral { color: #1565c0; }

  .dur-edit-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #eee; }
  .dur-edit-row input[type="number"] { width: 70px; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; font-weight: 600; text-align: center; }
  .dur-edit-row input[type="number"].highlight-bad { border-color: #c62828; background: #fff5f5; }

  .btn { padding: 7px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500; }
  .btn-green { background: #2e7d32; color: #fff; }
  .btn-green:hover { background: #1b5e20; }
  .btn-green:disabled { background: #a5d6a7; cursor: not-allowed; }
  .btn-blue { background: #1976d2; color: #fff; }
  .btn-blue:hover { background: #1565c0; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-outline { background: #fff; border: 1px solid #ccc; color: #333; }
  .btn-outline:hover { background: #f5f5f5; }
  .btn-quick { padding: 4px 10px; font-size: 12px; border: 1px solid #ccc; background: #fff; border-radius: 4px; cursor: pointer; color: #555; }
  .btn-quick:hover { background: #e3f2fd; border-color: #90caf9; color: #1565c0; }

  /* Tableau étapes */
  .steps-table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; overflow: hidden; }
  .steps-table th { background: #f5f5f5; text-align: left; padding: 8px 10px; font-size: 12px; font-weight: 600; color: #555; border-bottom: 1px solid #e0e0e0; }
  .steps-table td { padding: 7px 10px; font-size: 12px; border-bottom: 1px solid #f0f0f0; }
  .steps-table tr:last-child td { border-bottom: none; }
  .steps-table tr:hover { background: #f8faff; }
  .steps-table .place-name { font-weight: 500; color: #333; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Filtres sidebar */
  .filter-row { display: flex; gap: 6px; margin-top: 6px; }
  .filter-row select { flex: 1; padding: 7px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }

  span#serverStatus { font-size: 11px; color: #999; }
</style>
</head>
<body>
<div class="header">
  <h1>ORT Admin</h1>
  <span class="header-sub">Durées & Cohérence</span>
  <div style="flex:1"></div>
  <span id="serverStatus"></span>
</div>
<div id="statusBar"></div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      <div style="display:flex;gap:6px">
        <select id="selCC" style="flex:1"><option value="">Chargement...</option></select>
        <button class="btn btn-blue btn-sm" onclick="loadAll()">Tous</button>
      </div>
      <input type="text" id="searchBox" placeholder="Rechercher un itinéraire...">
      <div class="filter-row">
        <select id="filterType">
          <option value="all">Tous</option>
          <option value="mismatch">Écarts seulement</option>
          <option value="ok">Cohérents seulement</option>
        </select>
      </div>
    </div>
    <div class="sidebar-stats">
      <span>Total: <b id="stTotal">0</b></span>
      <span>Cohérents: <b id="stOk" style="color:#2e7d32">0</b></span>
      <span>Écarts: <b id="stBad" style="color:#c62828">0</b></span>
    </div>
    <div class="sidebar-list" id="listBox"></div>
  </div>
  <div class="editor" id="edBox">
    <div class="editor-empty">
      Choisissez un pays (ou "Tous") puis un itinéraire.<br><br>
      Les itinéraires dont la durée annoncée ne correspond pas<br>
      à la somme des durées conseillées par étape apparaîtront en rouge.
    </div>
  </div>
</div>

<script>
const API = 'http://127.0.0.1:8030';
const DP = 'data/Roadtripsprefabriques/countries';
const LANGS = ['fr','en','es','it','pt','ar'];

let CC = [];       // liste des codes pays
let allItins = []; // [{i: itinObject, cc: 'MX', fp: 'data/...'}]
let selected = null; // l'itin sélectionné
let titlesByLang = {}; // { fr: 'titre FR', en: 'titre EN', ... } — chargé à la sélection

const $ = id => document.getElementById(id);
function st(m, t) {
  const b = $('statusBar');
  b.textContent = m;
  b.className = t;
  b.style.display = 'block';
  clearTimeout(b._t);
  b._t = setTimeout(() => { b.className = ''; b.style.display = 'none'; }, 4000);
}

// ─── Chargement pays ────────────────────────────────────────────

async function loadCC() {
  try {
    const r = await fetch(API + '/' + DP + '/');
    const h = await r.text();
    const m = h.match(/href="([A-Z]{2,3})\/"/gi) || [];
    CC = m.map(x => (x.match(/href="([^"]+)\/"/i) || [])[1]).filter(Boolean);
    if (!CC.length) {
      // Fallback : tester les codes courants
      const codes = 'AD,AE,AL,AM,AR,AT,AU,AZ,BA,BD,BE,BG,BH,BO,BR,BT,BW,BY,CA,CH,CI,CL,CM,CN,CO,CR,CU,CV,CY,CZ,DE,DK,DO,DZ,EC,EE,EG,ES,ET,FI,FJ,FR,GA,GB,GE,GH,GR,GT,HK,HN,HR,HT,HU,ID,IE,IL,IN,IQ,IR,IS,IT,JM,JO,JP,KE,KG,KH,KR,KW,KZ,LA,LB,LK,LT,LU,LV,MA,MD,ME,MG,MK,MM,MN,MT,MU,MV,MX,MY,MZ,NA,NE,NG,NI,NL,NO,NP,NZ,OM,PA,PE,PH,PK,PL,PT,PY,QA,RO,RS,RW,SA,SC,SE,SG,SI,SK,SN,SO,SV,SZ,TG,TH,TJ,TN,TR,TT,TW,TZ,UA,UG,US,UY,UZ,VE,VN,XK,ZA,ZM,ZW'.split(',');
      const ck = codes.map(async c => {
        try { const r = await fetch(API + '/' + DP + '/' + c + '/', { method: 'HEAD' }); return r.ok ? c : null; } catch(e) { return null; }
      });
      CC = (await Promise.all(ck)).filter(Boolean);
    }
    CC.sort();
    const o = CC.map(c => '<option value="' + c + '">' + c + '</option>').join('');
    $('selCC').innerHTML = '<option value="">-- Pays --</option>' + o;
    $('serverStatus').textContent = CC.length + ' pays · OK';
  } catch(e) {
    $('serverStatus').textContent = 'Serveur OFF';
    st('Serveur non joignable (port 8030)', 'error');
  }
}

// ─── Chargement itinéraires ─────────────────────────────────────

async function loadIt(cc, lang) {
  cc = cc.toUpperCase();
  lang = lang || 'fr';
  for (const f of [cc + '.itins.modules-' + lang + '.json', cc.toLowerCase() + '.itins.modules-' + lang + '.json'])
    for (const d of [cc, cc.toLowerCase()])
      try {
        const r = await fetch(API + '/' + DP + '/' + d + '/' + f);
        if (!r.ok) continue;
        const j = await r.json();
        return { its: j.itineraries || [], fp: DP + '/' + d + '/' + f, cc };
      } catch(e) {}
  return { its: [], fp: null, cc };
}

$('selCC').onchange = async (e) => {
  const cc = e.target.value;
  if (!cc) return;
  st('Chargement ' + cc + '...', 'info');
  const r = await loadIt(cc);
  allItins = r.its.map(i => ({ i, cc: r.cc, fp: r.fp }));
  selected = null;
  renderList();
  $('edBox').innerHTML = '<div class="editor-empty">Sélectionnez un itinéraire</div>';
  st(allItins.length + ' itinéraires', 'success');
};

async function loadAll() {
  st('Chargement de tous les pays...', 'info');
  allItins = [];
  let n = 0;
  for (const c of CC) {
    const r = await loadIt(c);
    r.its.forEach(i => allItins.push({ i, cc: r.cc, fp: r.fp }));
    n++;
    if (n % 10 === 0) st(n + '/' + CC.length + '...', 'info');
  }
  selected = null;
  renderList();
  $('edBox').innerHTML = '<div class="editor-empty">Sélectionnez un itinéraire</div>';
  st(allItins.length + ' itinéraires (tous pays)', 'success');
}

// ─── Calculs durées ─────────────────────────────────────────────

function calcDurees(itin) {
  const days = itin.days_plan || [];
  const annonce = itin.estimated_days_base || 0;
  const nbEtapes = days.length;

  // Somme brute (toutes les lignes)
  const sommeBrute = days.reduce((s, d) => s + (d.suggested_days || 0), 0);

  // Calcul intelligent par place unique :
  // 1. Pour chaque place, on prend le MAX des suggested_days
  // 2. On compte le nombre de nuits passées sur place
  // 3. On regarde le temps de route pour arriver (drive_in du jour précédent)
  //    Si le trajet d'arrivée > 3h, la place nécessite au minimum 1 nuit
  //    même si suggested_days dit 0.3
  
  // D'abord, regrouper les jours par place
  const placeData = {}; // pid → { maxSd, nights, driveInMax }
  for (let i = 0; i < days.length; i++) {
    const d = days[i];
    const pid = d.night?.place_id || d.place_id || 'jour_' + d.day;
    const sd = d.suggested_days || 0;
    
    // Temps de route pour arriver à cette étape = to_next_leg de l'étape précédente
    let driveIn = 0;
    if (i > 0) {
      driveIn = days[i - 1].to_next_leg?.drive_min || 0;
    }
    
    if (!placeData[pid]) {
      placeData[pid] = { maxSd: 0, nights: 0, driveInMax: 0 };
    }
    placeData[pid].maxSd = Math.max(placeData[pid].maxSd, sd);
    placeData[pid].nights++;
    placeData[pid].driveInMax = Math.max(placeData[pid].driveInMax, driveIn);
  }

  // Calculer la durée effective par place
  let sommeMax = 0;
  const placeDetails = [];
  for (const [pid, pd] of Object.entries(placeData)) {
    // La durée effective = le max entre :
    // - le suggested_days de la place
    // - 1 nuit minimum si le trajet d'arrivée > 180 min (3h)
    let effectiveDays = pd.maxSd;
    let forced = false;
    if (pd.driveInMax > 180 && effectiveDays < 1) {
      effectiveDays = 1;
      forced = true;
    }
    sommeMax += effectiveDays;
    placeDetails.push({ pid, maxSd: pd.maxSd, nights: pd.nights, driveInMax: pd.driveInMax, effectiveDays, forced });
  }

  const nbPlacesUniques = Object.keys(placeData).length;
  const nbForcedNights = placeDetails.filter(p => p.forced).length;

  const ecart = annonce - sommeMax;
  const coherent = Math.abs(ecart) < 0.5;

  return { annonce, nbEtapes, sommeBrute, sommeMax, nbPlacesUniques, nbForcedNights, placeDetails, ecart, coherent };
}

// ─── Rendu sidebar ──────────────────────────────────────────────

function renderList() {
  const search = $('searchBox').value.toLowerCase();
  const filter = $('filterType').value;

  let list = allItins;
  if (search) list = list.filter(({ i }) => ((i.itin_id || i.id || '') + (i.title || '')).toLowerCase().includes(search));

  if (filter === 'mismatch') list = list.filter(({ i }) => !calcDurees(i).coherent);
  if (filter === 'ok') list = list.filter(({ i }) => calcDurees(i).coherent);

  // Stats globales
  const totalOk = allItins.filter(({ i }) => calcDurees(i).coherent).length;
  const totalBad = allItins.length - totalOk;
  $('stTotal').textContent = allItins.length;
  $('stOk').textContent = totalOk;
  $('stBad').textContent = totalBad;

  $('listBox').innerHTML = list.map(({ i, cc }) => {
    const id = i.itin_id || i.id;
    const d = calcDurees(i);
    const sel = selected && (selected.i.itin_id || selected.i.id) === id;
    const badgeCls = d.coherent ? 'badge-ok' : 'badge-warn';
    const badgeText = d.coherent ? d.annonce + 'j ✓' : d.annonce + 'j ≠ ' + d.sommeMax + 'j';
    const ecartCls = d.coherent ? 'ecart-ok' : 'ecart-bad';
    const ecartText = d.coherent ? '' : ' (écart ' + (d.ecart > 0 ? '+' : '') + Math.round(d.ecart * 10) / 10 + 'j)';

    return '<div class="itin-item ' + (sel ? 'selected' : '') + '" onclick="selectItin(\'' + id + '\')">'
      + '<div class="title">' + (i.title || id) + '</div>'
      + '<div class="meta">'
      + '<span>' + cc + '</span>'
      + '<span class="badge ' + badgeCls + '">' + badgeText + '</span>'
      + '<span>' + d.nbEtapes + ' étapes</span>'
      + (ecartText ? '<span class="ecart ' + ecartCls + '">' + ecartText + '</span>' : '')
      + '</div></div>';
  }).join('');
}

$('searchBox').oninput = renderList;
$('filterType').onchange = renderList;

// ─── Sélection itinéraire ───────────────────────────────────────

async function selectItin(id) {
  selected = allItins.find(({ i }) => (i.itin_id || i.id) === id);
  titlesByLang = {};
  renderList();
  renderEditor();

  // Charger les titres des 6 langues en arrière-plan
  if (!selected) return;
  const cc = selected.cc;
  for (const lang of LANGS) {
    try {
      const r = await loadIt(cc, lang);
      const target = r.its.find(x => (x.itin_id || x.id) === id);
      if (target && target.title) {
        titlesByLang[lang] = target.title;
      }
    } catch(e) {}
  }
  // Re-render pour afficher les titres chargés
  if (selected && (selected.i.itin_id || selected.i.id) === id) {
    renderEditor();
  }
}

// ─── Rendu éditeur ──────────────────────────────────────────────

function renderEditor() {
  const e = $('edBox');
  if (!selected) { e.innerHTML = '<div class="editor-empty">Sélectionnez un itinéraire</div>'; return; }

  const { i, cc, fp } = selected;
  const id = i.itin_id || i.id;
  const d = calcDurees(i);
  const days = i.days_plan || [];

  // Bloc résumé durées
  const inputCls = d.coherent ? '' : 'highlight-bad';
  let html = '<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px">'
    + '<div><div style="font-size:17px;font-weight:600">' + (i.title || id) + '</div>'
    + '<div style="font-size:12px;color:#888;margin-top:3px">' + id + ' · ' + cc + '</div></div></div>';

  // Bloc titres (dépliable)
  const hasLangs = Object.keys(titlesByLang).length > 0;
  html += '<details style="margin-bottom:14px;background:#fff;border:1px solid #e0e0e0;border-radius:6px;padding:0">'
    + '<summary style="padding:10px 14px;cursor:pointer;font-size:13px;font-weight:500;color:#555;user-select:none">'
    + '✏️ Modifier les titres (' + Object.keys(titlesByLang).length + '/6 langues chargées)</summary>'
    + '<div style="padding:10px 14px;border-top:1px solid #eee">';

  if (!hasLangs) {
    html += '<div style="color:#999;font-size:12px;padding:8px 0">Chargement des titres en cours...</div>';
  } else {
    for (const lang of LANGS) {
      const title = titlesByLang[lang] || '';
      const labelColor = title ? '#333' : '#ccc';
      html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'
        + '<span style="min-width:28px;font-size:11px;font-weight:600;color:' + labelColor + ';text-transform:uppercase">' + lang + '</span>'
        + '<input type="text" id="title_' + lang + '" value="' + (title || '').replace(/"/g, '&quot;') + '"'
        + ' style="flex:1;padding:6px 8px;border:1px solid #ddd;border-radius:4px;font-size:13px"'
        + ' placeholder="' + (title ? '' : 'Pas de titre pour cette langue') + '"'
        + ' oninput="onTitleChange()">'
        + '</div>';
    }
  }

  html += '</div></details>';

  html += '<div class="dur-summary">';

  // Ligne 1 : durée annoncée (modifiable)
  html += '<div class="dur-edit-row">'
    + '<span class="dur-label" style="font-weight:600">Durée annoncée (estimated_days_base) :</span>'
    + '<input type="number" id="editDays" min="1" max="90" value="' + d.annonce + '" class="' + inputCls + '" onchange="onDaysChange()">'
    + '<span style="font-size:13px;color:#888">jours</span>'
    + '<span style="margin-left:8px;font-size:11px;color:#aaa">Raccourci :</span>'
    + '<button class="btn-quick" onclick="setDays(' + d.sommeMax + ')" title="Aligner sur la somme MAX par place unique">= ' + d.sommeMax + 'j (calculé)</button>'
    + '<button class="btn-quick" onclick="setDays(' + d.nbEtapes + ')" title="Aligner sur le nombre d\'étapes">= ' + d.nbEtapes + 'j (nuits)</button>'
    + '</div>';

  // Ligne 2 : durée calculée (MAX par place unique) — la valeur de référence
  html += '<div class="dur-row" style="margin-top:12px">'
    + '<span class="dur-label">Durée calculée (max par place, route incluse) :</span>'
    + '<span class="dur-value ' + (d.coherent ? 'ok' : 'bad') + '">' + d.sommeMax + ' jours</span>'
    + '<span style="font-size:11px;color:#aaa;margin-left:8px">(' + d.nbPlacesUniques + ' places distinctes'
    + (d.nbForcedNights > 0 ? ', ' + d.nbForcedNights + ' nuit(s) forcée(s) par la route' : '')
    + ')</span>'
    + '</div>';

  // Ligne 3 : somme brute (pour info)
  if (d.sommeBrute !== d.sommeMax) {
    html += '<div class="dur-row">'
      + '<span class="dur-label">Somme brute suggested_days (toutes lignes) :</span>'
      + '<span class="dur-value neutral" style="font-size:13px;color:#999">' + d.sommeBrute + ' jours</span>'
      + '<span style="font-size:11px;color:#bbb;margin-left:8px">gonflé car certaines places apparaissent plusieurs nuits</span>'
      + '</div>';
  }

  // Ligne 4 : nb étapes
  html += '<div class="dur-row">'
    + '<span class="dur-label">Nombre de nuits (days_plan) :</span>'
    + '<span class="dur-value neutral">' + d.nbEtapes + '</span>'
    + '</div>';

  // Ligne 4b : détail des nuits forcées par la route
  if (d.nbForcedNights > 0) {
    const forcedList = d.placeDetails.filter(p => p.forced);
    html += '<div class="dur-row">'
      + '<span class="dur-label">Nuits forcées par la route (&gt;3h) :</span>'
      + '<span class="dur-value neutral" style="font-size:12px">'
      + forcedList.map(p => {
        const name = p.pid.split('::').slice(1).join(' ').replace(/-/g, ' ');
        return name + ' <span style="color:#c62828">(' + Math.round(p.driveInMax/60*10)/10 + 'h de route, sd=' + p.maxSd + '→1j)</span>';
      }).join(', ')
      + '</span></div>';
  }

  // Ligne 5 : verdict
  if (d.coherent) {
    html += '<div class="dur-row">'
      + '<span class="dur-label">Cohérence :</span>'
      + '<span class="dur-value ok">✓ OK — durée annoncée ≈ durée calculée</span>'
      + '</div>';
  } else {
    const ecartAbs = Math.round(Math.abs(d.ecart) * 10) / 10;
    html += '<div class="dur-row">'
      + '<span class="dur-label">Cohérence :</span>'
      + '<span class="dur-value bad">✗ Écart de ' + ecartAbs + ' jour(s) — '
      + (d.ecart > 0 ? 'durée annoncée trop longue' : 'durée annoncée trop courte')
      + '</span>'
      + '</div>';
  }

  // Bouton sauvegarder
  html += '<div style="margin-top:14px;display:flex;gap:8px;align-items:center">'
    + '<button class="btn btn-green" id="btnSave" onclick="saveDays()" disabled>Sauvegarder dans les 6 langues</button>'
    + '<span id="saveHint" style="font-size:11px;color:#aaa">Modifiez la valeur ci-dessus pour activer</span>'
    + '</div>';

  html += '</div>'; // fin dur-summary

  // Tableau des étapes
  html += '<div class="section-title">Détail des étapes (' + d.nbEtapes + ')</div>';
  html += '<table class="steps-table"><thead><tr>'
    + '<th>Jour</th><th>Lieu (nuit)</th><th>suggested_days</th><th>Visites</th><th>Activités</th><th>→ Suivant</th>'
    + '</tr></thead><tbody>';

  // Construire un set des places avec nuit forcée pour marquer dans le tableau
  const forcedPids = new Set(d.placeDetails.filter(p => p.forced).map(p => p.pid));

  days.forEach((day, idx) => {
    const pid = day.night?.place_id || '';
    const placeName = pid
      ? pid.split('::').slice(1).join(' ').replace(/-/g, ' ')
      : '—';
    const nbVisits = (day.visits || []).length;
    const nbActs = (day.activities || []).length;
    const next = day.to_next_leg;
    const driveMin = next?.drive_min || 0;
    const nextStr = next ? next.distance_km + ' km · ' + driveMin + ' min' : '—';
    const sdCls = (day.suggested_days || 0) > 1 ? 'font-weight:600;color:#1565c0' : '';

    // Route longue : rouge si > 3h
    const routeCls = driveMin > 180 ? 'font-weight:600;color:#c62828' : 'font-size:11px;color:#888';

    // Nuit forcée par la route : fond rouge clair
    const isForced = forcedPids.has(pid) && (day.suggested_days || 0) < 1;
    const rowCls = isForced ? 'background:#fff5f5' : '';

    html += '<tr style="' + rowCls + '">'
      + '<td>J' + day.day + '</td>'
      + '<td class="place-name" title="' + pid + '">' + placeName + (isForced ? ' 🚗' : '') + '</td>'
      + '<td style="' + sdCls + '">' + (day.suggested_days || 0) + (isForced ? ' →1' : '') + '</td>'
      + '<td>' + nbVisits + '</td>'
      + '<td>' + nbActs + '</td>'
      + '<td style="' + routeCls + '">' + nextStr + '</td>'
      + '</tr>';
  });

  html += '</tbody></table>';
  e.innerHTML = html;
}

// ─── Modification durée ou titre ─────────────────────────────────

function hasChanges() {
  if (!selected) return false;
  const d = calcDurees(selected.i);
  const newDays = parseInt($('editDays').value);
  if (!isNaN(newDays) && newDays !== d.annonce) return true;
  // Vérifier les titres modifiés
  for (const lang of LANGS) {
    const el = $('title_' + lang);
    if (!el) continue;
    const original = titlesByLang[lang] || '';
    if (el.value !== original) return true;
  }
  return false;
}

function updateSaveState() {
  const changed = hasChanges();
  $('btnSave').disabled = !changed;
  
  const changes = [];
  const d = calcDurees(selected.i);
  const newDays = parseInt($('editDays').value);
  if (!isNaN(newDays) && newDays !== d.annonce) {
    changes.push(d.annonce + ' → ' + newDays + ' jours');
  }
  let titleChanges = 0;
  for (const lang of LANGS) {
    const el = $('title_' + lang);
    if (!el) continue;
    if (el.value !== (titlesByLang[lang] || '')) titleChanges++;
  }
  if (titleChanges > 0) changes.push(titleChanges + ' titre(s) modifié(s)');
  
  $('saveHint').textContent = changed
    ? changes.join(' + ')
    : 'Modifiez la durée ou un titre pour activer';
  
  const input = $('editDays');
  if (input) input.classList.toggle('highlight-bad', !isNaN(newDays) && Math.abs(newDays - d.sommeMax) >= 0.5);
}

function onDaysChange() {
  updateSaveState();
}

function onTitleChange() {
  updateSaveState();
}

function setDays(val) {
  $('editDays').value = val;
  onDaysChange();
}

// ─── Sauvegarde dans les 6 langues ──────────────────────────────

async function saveDays() {
  if (!selected) return;

  const newVal = parseInt($('editDays').value);
  if (isNaN(newVal) || newVal < 1) { st('Valeur invalide', 'error'); return; }

  // Collecter les titres modifiés par langue
  const newTitles = {};
  for (const lang of LANGS) {
    const el = $('title_' + lang);
    if (!el) continue;
    const original = titlesByLang[lang] || '';
    if (el.value !== original && el.value.trim() !== '') {
      newTitles[lang] = el.value.trim();
    }
  }

  const id = selected.i.itin_id || selected.i.id;
  const cc = selected.cc;

  $('btnSave').disabled = true;
  $('btnSave').textContent = 'Sauvegarde en cours...';
  st('Sauvegarde de ' + id + ' dans les 6 langues...', 'info');

  let ok = 0, fail = 0;

  for (const lang of LANGS) {
    let done = false;
    const tried = new Set();
    const folders = [cc, cc.toLowerCase()];
    const fnames = [
      cc + '.itins.modules-' + lang + '.json',
      cc.toLowerCase() + '.itins.modules-' + lang + '.json'
    ];

    for (const fn of fnames) {
      if (done) break;
      for (const folder of folders) {
        if (done) break;
        const fp = DP + '/' + folder + '/' + fn;
        if (tried.has(fp.toLowerCase())) continue;
        tried.add(fp.toLowerCase());

        try {
          const r = await fetch(API + '/' + fp);
          if (!r.ok) continue;
          const data = await r.json();
          const itins = data.itineraries || [];
          const target = itins.find(x => (x.itin_id || x.id) === id);
          if (!target) continue;

          // Modifier la durée
          target.estimated_days_base = newVal;

          // Modifier le titre si modifié pour cette langue
          if (newTitles[lang]) {
            target.title = newTitles[lang];
          }

          // Sauvegarder via l'API
          const sv = await fetch(API + '/api/save-itinerary', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ path: fp, data: target, country: cc })
          });
          const j = await sv.json();
          if (j.success) { ok++; done = true; }
          else { fail++; done = true; }
        } catch(e) { continue; }
      }
    }
  }

  // Mettre à jour l'objet local
  if (ok > 0) {
    selected.i.estimated_days_base = newVal;
    if (newTitles['fr']) selected.i.title = newTitles['fr'];
    // Mettre à jour le cache des titres
    for (const [lang, title] of Object.entries(newTitles)) {
      titlesByLang[lang] = title;
    }
    renderList();
    renderEditor();
    const titleInfo = Object.keys(newTitles).length > 0
      ? ' + ' + Object.keys(newTitles).length + ' titre(s)'
      : '';
    st('Sauvegardé dans ' + ok + ' langue(s)' + titleInfo + (fail ? ' (' + fail + ' échec)' : ''), 'success');
  } else {
    st('Erreur : aucune langue sauvegardée', 'error');
  }

  $('btnSave').textContent = 'Sauvegarder dans les 6 langues';
}

// ─── Init ───────────────────────────────────────────────────────
loadCC();
</script>
