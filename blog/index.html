<meta property="og:title" content="Blog OneRoadTrip">
<meta property="og:type" content="website">

<style>
:root{--bg:#113f7a;--ink:#e7f6fb;--accent:#00b2ff;--heroBase:#0a2a57;--card-bg:rgba(255,255,255,0.06);--card-border:rgba(255,255,255,0.12);--max:1100px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
a{color:var(--accent);text-decoration:none}
.top-bar{display:flex;justify-content:space-between;align-items:center;max-width:var(--max);margin:0 auto;padding:14px 20px}
.top-bar .logo{font-size:1.2rem;font-weight:800;color:#fff}
.top-bar .logo span{color:var(--accent)}
.lang-select{display:flex;gap:4px}
.lang-select button{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);padding:5px 10px;border-radius:4px;font-size:.75rem;font-weight:600;cursor:pointer;text-transform:uppercase;transition:all .2s}
.lang-select button:hover{background:rgba(255,255,255,.15);color:#fff}
.lang-select button.active{background:var(--accent);color:#00243a;border-color:var(--accent)}
.blog-hero{text-align:center;padding:clamp(2rem,6vh,4rem) 20px clamp(1.5rem,4vh,3rem);background:linear-gradient(135deg,var(--heroBase),var(--bg))}
.blog-hero h1{font-size:clamp(1.6rem,4vw,2.6rem);font-weight:800;color:#fff;margin-bottom:.5rem}
.blog-hero p{font-size:clamp(.9rem,2vw,1.1rem);opacity:.75;max-width:600px;margin:0 auto}
.filters{max-width:var(--max);margin:0 auto;padding:1.5rem 20px 0}
.search-row{display:flex;gap:10px;flex-wrap:wrap}
.search-input{flex:1;min-width:200px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;padding:12px 16px;border-radius:8px;font-size:.95rem;outline:none;transition:border-color .2s}
.search-input::placeholder{color:rgba(255,255,255,.4)}
.search-input:focus{border-color:var(--accent)}
.filter-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.filter-tag{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);padding:6px 14px;border-radius:999px;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s}
.filter-tag:hover{background:rgba(255,255,255,.12);color:#fff}
.filter-tag.active{background:var(--accent);color:#00243a;border-color:var(--accent)}
.articles{max-width:var(--max);margin:0 auto;padding:2rem 20px 3rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px}
.article-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;overflow:hidden;transition:transform .2s,box-shadow .2s;cursor:pointer;backdrop-filter:blur(4px);display:block;color:inherit}
.article-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.25)}
.article-card img{width:100%;height:200px;object-fit:cover;display:block}
.card-body{padding:1.25rem}
.card-tags{display:flex;gap:6px;margin-bottom:.6rem;flex-wrap:wrap}
.card-tag{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 8px;border-radius:3px;background:rgba(0,178,255,.15);color:var(--accent)}
.card-tag.country{background:rgba(16,185,129,.15);color:#6ee7b7}
.article-card h2{font-size:1.05rem;font-weight:700;color:#fff;margin-bottom:.4rem;line-height:1.35}
.card-excerpt{font-size:.85rem;color:rgba(255,255,255,.6);line-height:1.5;margin-bottom:.75rem}
.card-meta{font-size:.75rem;color:rgba(255,255,255,.35)}
.no-results{text-align:center;padding:3rem 1rem;opacity:.5;font-size:1.1rem;grid-column:1/-1}
.back-home{text-align:center;padding:1rem 20px 2rem}
.back-home a{color:var(--accent);font-size:.9rem;font-weight:600}
@media(max-width:768px){
.articles{grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.article-card img{height:170px}
}
@media(max-width:480px){
.articles{grid-template-columns:1fr;gap:14px}
.article-card img{height:180px}
.search-row{flex-direction:column}
.top-bar{padding:10px 14px}
.blog-hero{padding:1.5rem 14px 1.2rem}
.blog-hero h1{font-size:1.4rem}
.filters{padding:1rem 14px 0}
.articles{padding:1.2rem 14px 2rem}
.card-body{padding:1rem}
}
</style>
</head>
<body>
<div class="top-bar">
  <a href="/" class="logo">One<span>Road</span>Trip</a>
  <div class="lang-select" id="langSelect"></div>
</div>
<div class="blog-hero">
  <h1 id="heroTitle">Blog</h1>
  <p id="heroDesc"></p>
</div>
<div class="filters">
  <div class="search-row">
    <input type="text" class="search-input" id="searchInput" placeholder="">
  </div>
  <div class="filter-tags" id="filterTags"></div>
</div>
<div class="articles" id="articlesGrid"></div>
<div class="back-home"><a href="/">&larr; OneRoadTrip.com</a></div>
<footer id="footer-legal"></footer>
